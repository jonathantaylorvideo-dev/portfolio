<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan D. Taylor | AI Architect</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <style>
        :root { --primary: #00ffcc; --snap-pink: #ff007f; --card-bg: rgba(5, 12, 12, 0.9); }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; background: #000 url('assets/city.png') no-repeat center center fixed; background-size: 110%; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .overlay { 
            position: relative; height: 100vh; width: 100vw; 
            display: flex; align-items: center; justify-content: center; 
            background: radial-gradient(circle, transparent 0%, rgba(0,0,0,0.8) 100%); 
            z-index: 5; 
        }
        
        .bento-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 90%; max-width: 1100px; z-index: 10; }
        
        .card { 
            background: var(--card-bg); backdrop-filter: blur(20px); 
            border: 1px solid rgba(0, 255, 204, 0.2); border-radius: 22px; 
            padding: 30px; transform-style: preserve-3d; cursor: pointer; 
            position: relative; overflow: hidden; transition: border-color 0.3s ease; 
            pointer-events: auto;
        }
        
        .card:hover { border-color: var(--primary); }
        .video-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; opacity: 0.4; mix-blend-mode: screen; filter: grayscale(1); }
        .hero { grid-column: span 3; min-height: 250px; display: flex; flex-direction: column; justify-content: center; }
        .hero h1 { font-size: 3.2rem; margin: 0; color: var(--primary); text-shadow: 0 0 20px rgba(0,255,204,0.5); }
        .tag { font-family: monospace; color: var(--primary); font-size: 0.7rem; letter-spacing: 2px; }

        /* --- HUD & SCAN EFFECTS --- */
        @keyframes scanline {
            0% { top: 0%; opacity: 0; }
            5% { opacity: 1; }
            95% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, transparent, var(--snap-pink), #fff, var(--snap-pink), transparent);
            box-shadow: 0 0 15px var(--snap-pink);
            z-index: 10;
            animation: scanline 3s linear infinite;
            pointer-events: none;
        }
