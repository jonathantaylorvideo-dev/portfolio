<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan D. Taylor | AI Architect</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    
    <style>
        :root { 
            --primary: #00ffcc; 
            --card-bg: rgba(5, 12, 12, 0.85); 
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background-color: #000; color: #fff;
            font-family: 'Segoe UI', sans-serif; overflow: hidden; 
        }

        /* --- 🌌 PARALLAX CITY LAYER --- */
        #parallax-bg {
            position: fixed;
            top: -10%; left: -10%;
            width: 120%; height: 120%;
            background: url('assets/city.png') no-repeat center center;
            background-size: cover;
            z-index: -5;
            will-change: transform;
        }

        /* --- 💡 LIGHTING EFFECTS --- */
        .lighting-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(0,0,0,0.85) 100%);
            z-index: -4; pointer-events: none;
        }

        .neon-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 255, 204, 0.05) 0%, transparent 50%);
            z-index: -3; pointer-events: none;
        }

        /* --- 🍱 INTERFACE --- */
        .wrapper { 
            position: relative; z-index: 10; height: 100vh; 
            display: flex; align-items: center; justify-content: center;
        }
        
        .bento-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 25px; width: 90%; max-width: 1100px;
        }

        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-radius: 28px; padding: 40px;
            transform-style: preserve-3d;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9);
            transition: border-color 0.3s ease;
        }

        .card:hover { border-color: var(--primary); }

        .hero { grid-column: span 3; }
        .hero h1 { 
            font-size: 3.8rem; margin: 0; color: var(--primary); 
            transform: translateZ(80px); /* Massive 3D pop */
            text-shadow: 0 0 25px rgba(0, 255, 204, 0.4);
        }

        .tag { font-family: monospace; color: var(--primary); font-size: 0.8rem; letter-spacing: 2px; }

        @media (max-width: 900px) { .bento-grid { grid-template-columns: 1fr; } .hero { grid-column: span 1; } }
    </style>
</head>
<body>

    <div id="parallax-bg"></div>
    <div class="lighting-overlay"></div>
    <div class="neon-glow"></div>

    <div class="wrapper">
        <div class="bento-grid">
            
            <div class="card hero" data-tilt>
                <span class="tag">[ IDENTITY_CONFIRMED ]</span>
                <h1 style="margin-top: 10px;">Jonathan D. Taylor</h1>
                <p style="transform: translateZ(40px); opacity: 0.8; font-size: 1.2rem;">AI Systems Architect & Agentic Workflow Designer</p>
            </div>

            <div class="card" data-tilt>
                <h3>Status</h3>
                <p class="tag" style="font-size: 1rem;">LIVE_NODE_01</p>
                <p style="font-size: 0.8rem; opacity: 0.6; margin-top: 10px;">St. Louis, MO</p>
            </div>

            <div class="card" data-tilt style="grid-column: span 2;">
                <h3>Strategy Audit</h3>
                <p style="font-size: 0.9rem; margin-bottom: 20px; opacity: 0.7;">Ready to optimize your creative backend?</p>
                <button style="width:100%; padding:15px; background:var(--primary); color:black; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">INITIALIZE_SYSTEM</button>
            </div>

            <div class="card" data-tilt>
                <h3>Creative</h3>
                <p style="font-size: 0.85rem; opacity: 0.8;">Prog-Folk Noir</p>
                <p style="font-size: 0.8rem; opacity: 0.5;">Multimedia Studio</p>
            </div>

        </div>
    </div>

<script>
    // 🕹️ 3D TILT LOGIC
    VanillaTilt.init(document.querySelectorAll(".card"), {
        max: 12, 
        speed: 1000, 
        glare: true, 
        "max-glare": 0.4, 
        perspective: 1000, 
        scale: 1.05
    });

    // 🌌 PARALLAX MOUSE LOGIC
    const bg = document.getElementById('parallax-bg');
    document.addEventListener('mousemove', (e) => {
        // Move background slightly opposite to mouse
        const moveX = (window.innerWidth / 2 - e.pageX) / 35;
        const moveY = (window.innerHeight / 2 - e.pageY) / 35;
        bg.style.transform = `translate(${moveX}px, ${moveY}px)`;
    });
</script>
</body>
</html>
