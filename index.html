<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan D. Taylor | AI Architect</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    
    <style>
        :root { 
            --primary: #00ffcc; 
            --bg: #050505; 
            --card: rgba(20, 20, 20, 0.4); /* 40% opacity - very transparent */
            --text: #ffffff; 
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* --- 🎥 VIDEO CONTAINER --- */
        .video-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; 
            background: #002222; /* If you see DARK GREEN, the video file is missing */
            overflow: hidden;
        }

        .video-background video {
            position: absolute;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            opacity: 0.6; 
            filter: grayscale(100%) brightness(0.7);
        }

        /* --- 📺 THE SCANLINE OVERLAY --- */
        /* I have made this much lighter so it cannot possibly block the view */
        .video-background::after {
            content: "";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none; 
            z-index: -1; 
        }

        /* --- 🍱 UI LAYER --- */
        .wrapper { position: relative; z-index: 10; max-width: 1200px; margin: 0 auto; padding: 60px 20px; }
        
        .bento-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }

        .card { 
            background: var(--card); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 30px;
            transform-style: preserve-3d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card:hover { border-color: var(--primary); z-index: 100; }

        .hero-card { grid-column: span 3; }
        .hero-card h1 { font-size: 3.5rem; margin: 0; color: var(--primary); transform: translateZ(50px); }

        .audit-card { grid-column: span 2; border: 1px solid var(--primary); }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; background: #333; }
        .online-dot { background: var(--primary); box-shadow: 0 0 10px var(--primary); }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-content { background: #111; width: 80%; padding: 40px; border-radius: 20px; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 25px; cursor: pointer; color: #666; }

        input, textarea, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; }
        button { background: var(--primary); font-weight: bold; cursor: pointer; }

        @media (max-width: 900px) { .bento-grid { grid-template-columns: 1fr; } .hero-card, .audit-card { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="video-background">
        <video id="bgVideo" autoplay muted loop playsinline>
            <source src="assets/hero-loop.webm" type="video/webm">
        </video>
    </div>

    <div class="wrapper">
        <div class="bento-grid">
            <div class="card hero-card" onclick="openModal('about-modal')">
                <h1>Jonathan D. Taylor</h1>
                <p>AI Systems Architect & Agentic Workflow Designer</p>
                <small style="color: var(--primary)">[ CLICK TO START ]</small>
            </div>

            <div class="card" data-tilt>
                <h3>Status</h3>
                <span id="status-dot" class="status-dot"></span>
                <span id="status-text">CONNECTING...</span>
            </div>

            <div class="card audit-card" data-tilt>
                <h3>⚡ Strategy Audit</h3>
                <form id="auditForm">
                    <input type="text" id="bizName" placeholder="Business Name" required>
                    <textarea id="bottleneck" placeholder="Bottleneck" rows="2" required></textarea>
                    <button type="submit" id="submitBtn" disabled>Initiate</button>
                </form>
            </div>

            <div class="card" data-tilt>
                <h3>Creative Engine</h3>
                <p>Multimedia Storytelling.</p>
            </div>
        </div>
    </div>

    <div id="about-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('about-modal')">&times;</span>
            <h2>About</h2>
            <p>Architecting AI solutions.</p>
        </div>
    </div>

    <div id="audit-result-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('audit-result-modal')">&times;</span>
            <div id="audit-text-content"></div>
        </div>
    </div>

<script>
    const API_BASE = "https://ai-strategy-engine.onrender.com";

    // 🕹️ MARVEL SNAP TILT
    VanillaTilt.init(document.querySelectorAll(".card"), {
        max: 15, speed: 400, glare: true, "max-glare": 0.3, perspective: 1000, scale: 1.05
    });

    // 🎥 VIDEO FIX
    const video = document.getElementById('bgVideo');
    const playVideo = () => { video.play().catch(() => {}); };
    window.addEventListener('load', playVideo);
    document.body.addEventListener('click', playVideo, { once: true });

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    async function checkConnection() {
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');
        const btn = document.getElementById('submitBtn');
        try {
            const res = await fetch(`${API_BASE}/api/status`);
            if (res.ok) {
                dot.classList.add('online-dot');
                text.innerText = "ONLINE";
                btn.disabled = false;
            }
        } catch (err) { text.innerText = "OFFLINE"; }
    }
    checkConnection();
</script>
</body>
</html>
