<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Strategy Audit | Local Architect Node</title>
    <style>
        :root { --primary: #00ffcc; --bg: #0a0a0a; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; display: flex; justify-content: center; padding: 20px; }
        .container { max-width: 800px; width: 100%; background: #111; padding: 30px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--primary); margin-bottom: 10px; }
        .status-bar { font-size: 0.85rem; margin-bottom: 20px; padding: 10px; background: #1a1a1a; border-radius: 6px; border-left: 4px solid #444; }
        .status-online { border-left-color: var(--primary); color: var(--primary); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        button { background: var(--primary); color: black; border: none; padding: 12px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #00d4aa; transform: translateY(-2px); }
        #audit-result { margin-top: 30px; padding: 20px; background: #1a1a1a; border-radius: 8px; border: 1px dashed #444; min-height: 100px; white-space: pre-wrap; }
        .loading { color: var(--primary); font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Systems Audit</h1>
    <p>Generate a professional AI automation roadmap for your business.</p>

    <div id="status-box" class="status-bar">
        Status: <span id="status-text">Checking Local Node...</span>
    </div>

    <form id="auditForm">
        <div class="form-group">
            <label>Business Name</label>
            <input type="text" id="bizName" placeholder="e.g. Heroic Comics & Games" required>
        </div>
        <div class="form-group">
            <label>Industry</label>
            <select id="industry">
                <option value="Retail">Local Retail (LGS/Comics)</option>
                <option value="Creative">Creative Services (Film/Music)</option>
                <option value="Technical">Technical Operations</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Current Biggest Bottleneck</label>
            <textarea id="bottleneck" rows="3" placeholder="e.g. Manual inventory entry taking 10 hours a week..."></textarea>
        </div>
        <button type="submit" id="submitBtn">Initiate Free Audit</button>
    </form>

    <div id="audit-result">
        Your AI-generated ROI report will appear here...
    </div>
</div>

<script>
    const statusText = document.getElementById('status-text');
    const statusBox = document.getElementById('status-box');
    const auditForm = document.getElementById('auditForm');
    const resultDiv = document.getElementById('audit-result');
    const submitBtn = document.getElementById('submitBtn');

    // 1. Check if the Docker Container is actually running
    async function checkConnection() {
        try {
            const response = await fetch('http://localhost:3000/api/status');
            if (response.ok) {
                statusText.innerText = "🟢 Local Architect Node Active";
                statusBox.classList.add('status-online');
                submitBtn.disabled = false;
            }
        } catch (err) {
            statusText.innerText = "🔴 Local Node Offline (Run 'node server.js' in Docker)";
            statusBox.classList.remove('status-online');
            submitBtn.disabled = true;
        }
    }

    // 2. Handle the Audit Generation
    auditForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = {
            businessName: document.getElementById('bizName').value,
            industry: document.getElementById('industry').value,
            bottleneck: document.getElementById('bottleneck').value
        };

        resultDiv.innerHTML = '<p class="loading">Architect is analyzing your workflow... please wait.</p>';
        submitBtn.innerText = "Processing...";
        submitBtn.disabled = true;

        try {
            const response = await fetch('http://localhost:3000/api/generate-audit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            if (!response.ok) throw new Error('Server Error');

            const data = await response.json();
            resultDiv.innerHTML = `<h3>Audit Results for ${formData.businessName}</h3>${data.audit}`;
            
        } catch (error) {
            resultDiv.innerHTML = `<p style="color: #ff6666;"><strong>Error:</strong> Could not connect to the local AI engine. Make sure Docker is running on Port 3000.</p>`;
        } finally {
            submitBtn.innerText = "Initiate Free Audit";
            submitBtn.disabled = false;
        }
    });

    // Initial connection check
    checkConnection();
    // Re-check every 10 seconds to ensure the bridge stays alive
    setInterval(checkConnection, 10000);
</script>

</body>
</html>
