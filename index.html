<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan D. Taylor | AI Architect</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <style>
        :root { 
            --primary: #00cca3; /* Muted Phosphor Teal */
            --snap-pink: #bc005e; /* Desaturated Magenta */
            --card-bg: rgba(7, 10, 10, 0.92); 
        }
        
        body, html { 
            margin: 0; padding: 0; min-height: 100vh; width: 100vw; 
            background: #000 url('assets/city.png') no-repeat center center fixed; 
            background-size: cover; color: #d1d1d1; font-family: 'Segoe UI', sans-serif; 
            overflow-x: hidden; 
        }
        
        .overlay { 
            position: relative; min-height: 100vh; width: 100vw; 
            display: flex; align-items: center; justify-content: center; 
            background: radial-gradient(circle, transparent 10%, rgba(0,0,0,0.85) 100%); 
            z-index: 10; 
        }
        
        .bento-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 90%; max-width: 1100px; z-index: 20; }
        
        .card { 
            background: var(--card-bg); backdrop-filter: blur(25px); 
            border: 1px solid rgba(0, 204, 163, 0.1); border-radius: 22px; 
            padding: 30px; transform-style: preserve-3d; cursor: pointer; 
            position: relative; overflow: hidden; transition: all 0.4s ease; 
        }
        
        .card:hover { border-color: var(--primary); box-shadow: 0 0 30px rgba(0, 204, 163, 0.15); }
        .hero { grid-column: span 3; min-height: 250px; display: flex; flex-direction: column; justify-content: center; }
        .hero h1 { font-size: 3.2rem; margin: 0; color: var(--primary); text-shadow: 0 0 15px rgba(0,204,163,0.3); }
        .tag { font-family: monospace; color: var(--primary); font-size: 0.65rem; letter-spacing: 3px; opacity: 0.8; }

        /* Muted HUD Effects */
        @keyframes scanline { 0% { top: 0%; opacity: 0; } 5% { opacity: 0.5; } 95% { opacity: 0.5; } 100% { top: 100%; opacity: 0; } }
        .scan-line { position: absolute; width: 100%; height: 2px; background: linear-gradient(to right, transparent, var(--snap-pink), #fff, var(--snap-pink), transparent); box-shadow: 0 0 10px var(--snap-pink); z-index: 10; animation: scanline 4s linear infinite; pointer-events: none; }
        .bracket { position: absolute; width: 18px; height: 18px; border: 1.5px solid var(--snap-pink); opacity: 0.5; z-index: 11; }
        .tl { top: 12px; left: 12px; border-right: 0; border-bottom: 0; }
        .tr { top: 12px; right: 12px; border-left: 0; border-bottom: 0; }
        .bl { bottom: 12px; left: 12px; border-right: 0; border-top: 0; }
        .br { bottom: 12px; right: 12px; border-left: 0; border-top: 0; }

        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); display: none; z-index: 999; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: #050808; border: 1px solid rgba(0,204,163,0.2); padding: 35px; border-radius: 28px; width: 90%; max-width: 520px; position: relative; }
        
        .input-tabs { display: flex; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid #1a1a1a; }
        .in-tab { padding: 8px 0; font-family: monospace; font-size: 0.6rem; cursor: pointer; color: #555; transition: 0.3s; letter-spacing: 1px; }
        .in-tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        
        .vault-panel { display: none; }
        .vault-panel.active { display: block; }
        
        .node-btn { padding: 10px 20px; background: transparent; border: 1px solid var(--primary); color: var(--primary); font-family: monospace; font-size: 0.6rem; cursor: pointer; border-radius: 4px; transition: 0.3s; }
        .node-btn:hover { background: rgba(0,204,163,0.1); }
        
        input[type="text"] { 
            width: 100%; padding: 14px; background: rgba(0,0,0,0.4); border: 1px solid #222; 
            color: #fff; border-radius: 8px; font-family: monospace; font-size: 0.8rem; outline: none; box-sizing: border-box;
        }
        input[type="text"]:focus { border-color: var(--primary); }

        @media (max-width: 900px) { .bento-grid { grid-template-columns: 1fr; } .hero { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="overlay">
        <div class="bento-grid">
            <div class="card hero" data-tilt onclick="ui.open('About')">
                <span class="tag">[ ARCHITECT_VERIFIED ]</span>
                <h1>Jonathan D. Taylor</h1>
                <p style="opacity: 0.7;">AI Systems Architect & Agentic Workflow Designer</p>
            </div>
            <div class="card" data-tilt onclick="ui.open('Audit')"><span class="tag">01_AUDIT</span><h3>Strategy</h3><p style="font-size:0.75rem; opacity:0.5;">LGS Optimization</p></div>
            <div class="card" data-tilt style="grid-column: span 2;" onclick="ui.open('Work')"><span class="tag">02_WORK</span><h3>Portfolio</h3><p style="font-size:0.75rem; opacity:0.5;">Adventures of Intrigue</p></div>
            <div class="card" data-tilt onclick="ui.open('Vault')"><span class="tag">03_VAULT</span><h3>Visual Vault</h3><p style="font-size:0.75rem; opacity:0.5;">Multimodal Node</p></div>
            <div class="card" data-tilt onclick="ui.open('Terminal')"><span class="tag">04_LOGS</span><h3>Terminal</h3><p style="font-size:0.75rem; opacity:0.5;">System Events</p></div>
        </div>
    </div>

    <div id="modal-overlay" onclick="ui.close()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-body"></div>
            <div style="text-align:center; margin-top:30px; cursor:pointer; color:var(--primary); font-family:monospace; font-size:0.65rem; opacity:0.5;" onclick="ui.close()">[ TERMINATE_SESSION ]</div>
        </div>
    </div>

<script>
    const ui = {
        open: (type) => {
            const body = document.getElementById('modal-body');
            document.getElementById('modal-overlay').style.display = 'flex';
            if (type === 'Vault') {
                body.innerHTML = `
                    <h2 style="color:var(--primary); font-size:1.1rem; letter-spacing:2px; margin-bottom:20px;">VISUAL_VAULT.exe</h2>
                    <div class="input-tabs">
                        <div class="in-tab active" onclick="ui.switchInTab('camera')">LENS_STREAM</div>
                        <div class="in-tab" onclick="ui.switchInTab('upload')">DATA_UPLOAD</div>
                        <div class="in-tab" onclick="ui.switchInTab('text')">TEXT_QUERY</div>
                    </div>
                    
                    <div id="camera" class="vault-panel active">
                        <div style="background:#000; border:1px solid rgba(188,0,94,0.15); height:220px; border-radius:14px; position:relative; overflow:hidden;">
                            <div class="scan-line"></div>
                            <div class="bracket tl"></div><div class="bracket tr"></div><div class="bracket bl"></div><div class="bracket br"></div>
                            <video id="vault-preview" autoplay playsinline style="width:100%; height:100%; object-fit:cover; opacity:0.8;"></video>
                            <div style="position:absolute; bottom:12px; left:50%; transform:translateX(-50%); display:flex; gap:10px;">
                                <button class="node-btn" style="border-color:var(--snap-pink); color:var(--snap-pink);" onclick="ui.activateCamera('user')">FRONT</button>
                                <button class="node-btn" style="background:var(--snap-pink); color:#fff; border:none;" onclick="ui.activateCamera('environment')">REAR</button>
                            </div>
                        </div>
                        <button class="node-btn" id="snap-btn" style="width:100%; margin-top:15px; display:none; border-color:var(--snap-pink); color:var(--snap-pink);" onclick="ui.captureAndScan()">[ RUN_OPTICAL_SCAN ]</button>
                    </div>

                    <div id="upload" class="vault-panel">
                        <div style="border:1px dashed #222; height:220px; border-radius:14px; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="document.getElementById('vault-file').click()">
                            <span style="font-family:monospace; font-size:0.65rem; color:#444;">SELECT_FILE_FOR_INGESTION</span>
                        </div>
                    </div>

                    <div id="text" class="vault-panel">
                        <div style="margin-top: 10px;">
                            <span style="font-family:monospace; font-size:0.6rem; color:#555; display:block; margin-bottom:12px;">INPUT_SEARCH_PARAMETERS</span>
                            <input type="text" id="user-prompt" placeholder="Ex: 'Grade condition', 'Estimate Fiji Infrastructure'">
                            <button class="node-btn" style="width:100%; margin-top:20px;" onclick="ui.runRealScan(null, null, document.getElementById('user-prompt').value)">[ EXECUTE_QUERY ]</button>
                        </div>
                    </div>

                    <input type="file" id="vault-file" style="display:none" accept="image/*" onchange="ui.runRealScan(this.files[0])">
                    
                    <div id="vault-results" style="margin-top:20px; display:none; border-top:1px solid #111; padding-top:15px; font-family:monospace;">
                        <p id="scan-status" style="font-size:0.7rem; color:var(--snap-pink);">[ PROCESSING... ]</p>
                        <div id="vault-data-display" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;"></div>
                    </div>`;
            } else { body.innerHTML = `<h2 style="color:var(--primary)">${type} Node</h2><p style="opacity:0.6;">Establishing secure link...</p>`; }
        },
        switchInTab: (id) => {
            document.querySelectorAll('.in-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.vault-panel').forEach(v => v.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(id).classList.add('active');
        },
        activateCamera: async (mode) => {
            const v = document.getElementById('vault-preview');
            const s = document.getElementById('snap-btn');
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
            v.srcObject = stream; s.style.display = 'block';
        },
        captureAndScan: () => {
            const v = document.getElementById('vault-preview');
            const c = document.createElement('canvas');
            const scale = Math.min(1, 1024 / Math.max(v.videoWidth, v.videoHeight));
            c.width = v.videoWidth * scale; c.height = v.videoHeight * scale;
            c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
            const b64 = c.toDataURL('image/jpeg', 0.7).split(',')[1];
            v.srcObject.getTracks().forEach(t => t.stop());
            ui.runRealScan(null, b64);
        },
        runRealScan: async (file, d64 = null, p = "") => {
            const res = document.getElementById('vault-results');
            const status = document.getElementById('scan-status');
            const disp = document.getElementById('vault-data-display');
            res.style.display = 'block';
            let b64 = d64;
            if (file) {
                const b = await createImageBitmap(file);
                const c = document.createElement('canvas');
                c.width = b.width; c.height = b.height;
                c.getContext('2d').drawImage(b, 0, 0);
                b64 = c.toDataURL('image/jpeg', 0.7).split(',')[1];
            }
            const response = await fetch('/api/analyze', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ image: b64, prompt: p }) });
            const data = await response.json();
            status.innerText = `[ SCAN_SUCCESS ]: ${data.name || 'DATA_NODE'}`;
            disp.innerHTML = `<div style="font-size:0.6rem; color:#666;">GRADE: <span style="color:#fff;">${data.grade || '--'}</span></div><div style="font-size:0.6rem; color:#666;">VALUE: <span style="color:#fff;">${data.value || '--'}</span></div><div style="grid-column:span 2; font-size:0.6rem; color:var(--primary); line-height:1.4;">${data.lore || ''}</div>`;
        },
        close: () => { 
            const v = document.getElementById('vault-preview');
            if(v && v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('modal-overlay').style.display = 'none'; 
        }
    };
    VanillaTilt.init(document.querySelectorAll(".card"), { max: 5, speed: 400, glare: true, "max-glare": 0.1 });
</script>
</body>
</html>
