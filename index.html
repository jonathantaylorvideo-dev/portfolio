<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan D. Taylor | AI Architect</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <style>
        :root { --primary: #00ffcc; --card-bg: rgba(5, 10, 10, 0.9); }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* --- 🌃 EXTERNAL HOSTING (BYPASS GITHUB FOLDER) --- */
        #city-bg {
            position: fixed; top: -10%; left: -10%; width: 120%; height: 120%;
            /* Using a high-speed reliable placeholder first to test */
            background: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=2070') no-repeat center center;
            background-size: cover; z-index: -5;
        }

        .wrapper { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 90%; max-width: 1100px; }
        .card { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--primary); border-radius: 20px; padding: 30px; transform-style: preserve-3d; }
        .hero { grid-column: span 3; }
        h1 { color: var(--primary); font-size: 3rem; margin: 0; transform: translateZ(50px); }
    </style>
</head>
<body>
    <div id="city-bg"></div>
    <div class="wrapper">
        <div class="grid">
            <div class="card hero" data-tilt>
                <h1>Jonathan D. Taylor</h1>
                <p>AI Systems Architect</p>
            </div>
            <div class="card" data-tilt><h3>Status</h3><p style="color:var(--primary)">ONLINE</p></div>
        </div>
    </div>
    <script>
        VanillaTilt.init(document.querySelectorAll(".card"), { max: 15, speed: 1000, scale: 1.05 });
    </script>
</body>
</html>
