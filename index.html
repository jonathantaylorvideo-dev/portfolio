<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan D. Taylor | AI Architect</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <style>
        :root { 
            --primary: #00cca3; 
            --card-bg: rgba(7, 10, 10, 0.94); 
            --snap-pink: #bc005e; 
            --text-main: #e0e0e0;
        }

        body, html { 
            margin: 0; padding: 0; min-height: 100vh; 
            background: #000 url('assets/city.png') no-repeat center center fixed; 
            background-size: cover; color: var(--text-main); 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            overflow-x: hidden;
        }

        .overlay { 
            min-height: 100vh; display: flex; align-items: center; justify-content: center; 
            background: radial-gradient(circle, transparent 10%, rgba(0,0,0,0.85) 100%); 
        }

        .bento-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; 
            width: 92%; max-width: 1150px; 
        }

        .card { 
            background: var(--card-bg); backdrop-filter: blur(30px); 
            border: 1px solid rgba(0, 204, 163, 0.15); border-radius: 24px; 
            padding: 30px; cursor: pointer; transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); 
            position: relative; overflow: hidden;
        }

        .card:hover { border-color: var(--primary); box-shadow: 0 0 40px rgba(0, 204, 163, 0.2); }
        .hero { grid-column: span 3; }
        .hero h1 { font-size: 3.5rem; margin: 0; color: var(--primary); letter-spacing: -1.5px; }
        .hero p { opacity: 0.8; font-size: 1.2rem; margin-top: 5px; font-weight: 300; }

        #modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.97); 
            display: none; z-index: 999; align-items: center; justify-content: center; 
            backdrop-filter: blur(15px); 
        }

        .modal-content { 
            background: #080c0c; border: 1px solid rgba(0,204,163,0.3); 
            padding: 40px; border-radius: 30px; width: 95%; max-width: 750px; 
        }

        #audit-chat-window { 
            height: 380px; overflow-y: auto; margin-bottom: 25px; 
            padding-right: 15px; scrollbar-width: thin; scrollbar-color: var(--primary) transparent;
        }

        .msg { margin-bottom: 22px; font-size: 0.95rem; line-height: 1.6; }
        .msg.bot { color: var(--primary); border-left: 3px solid var(--primary); padding-left: 18px; }
        .msg.user { color: #fff; text-align: right; font-family: 'Courier New', monospace; background: rgba(0,204,163,0.05); padding: 12px; border-radius: 12px; }

        .input-wrap { display: flex; gap: 12px; }
        input[type="text"] { 
            flex-grow: 1; padding: 15px; background: rgba(0,0,0,0.6); 
            border: 1px solid #333; color: #fff; border-radius: 12px; outline: none; 
        }
        input[type="text"]:focus { border-color: var(--primary); }

        .node-btn { 
            padding: 14px 28px; background: transparent; border: 1px solid var(--primary); 
            color: var(--primary); font-family: monospace; font-weight: 700; 
            cursor: pointer; border-radius: 8px; transition: 0.3s;
        }
        .node-btn:hover { background: var(--primary); color: #000; }

        #status-text { font-family: monospace; font-size: 0.65rem; color: var(--primary); letter-spacing: 3px; }

        @media (max-width: 950px) { .bento-grid { grid-template-columns: 1fr; } .hero { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="overlay">
        <div class="bento-grid">
            <div class="card hero" onclick="ui.open('About')">
                <div id="status-text">UPLINK_CHECKING...</div>
                <h1>Jonathan D. Taylor</h1>
                <p>AI Systems Architect & Agentic Workflow Designer</p>
            </div>
            <div class="card" onclick="ui.open('Audit')">
                <h3 style="color:var(--primary)">AI Auditor</h3>
                <p style="font-size:0.85rem; opacity:0.7;">2026 Small Business Diagnostic Engine.</p>
            </div>
            <div class="card" style="grid-column: span 2;" onclick="ui.open('Work')">
                <h3>Portfolio</h3>
                <p style="font-size:0.85rem; opacity:0.7;">Case studies in high-velocity automation.</p>
            </div>
            <div class="card" onclick="ui.open('Vault')">
                <h3>Visual Vault</h3>
                <p style="font-size:0.85rem; opacity:0.7;">Neural project archive & assets.</p>
            </div>
            <div class="card" onclick="ui.open('Terminal')">
                <h3>Terminal</h3>
                <p style="font-size:0.85rem; opacity:0.7;">Direct core access.</p>
            </div>
        </div>
    </div>

    <div id="modal-overlay" onclick="ui.close()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-body"></div>
            <div style="text-align:center; margin-top:40px; cursor:pointer; color:var(--primary); font-family:monospace; font-size:0.7rem; letter-spacing:4px;" onclick="ui.close()">
                [ TERMINATE_SESSION ]
            </div>
        </div>
    </div>

<script>
    const API_BASE = "https://ai-strategy-engine.onrender.com";

    const ui = {
        auditHistory: [],

        open: (type) => {
            const body = document.getElementById('modal-body');
            document.getElementById('modal-overlay').style.display = 'flex';
            
            if (type === 'Audit') {
                ui.auditHistory = []; 
                body.innerHTML = `
                    <div style="margin-bottom:20px;">
                        <h2 style="color:var(--primary); margin:0;">Strategic AI Audit</h2>
                        <p style="font-size:0.75rem; color:var(--snap-pink); font-weight:bold;">[ AGENTIC_DISCOVERY_ACTIVE ]</p>
                    </div>
                    <div id="audit-chat-window"></div>
                    <div id="audit-input-area">
                        <div class="input-wrap">
                            <input type="text" id="client-input" placeholder="Initiate diagnostic response..." onkeypress="if(event.key==='Enter') ui.sendAuditMessage()">
                            <button class="node-btn" onclick="ui.sendAuditMessage()">SEND</button>
                        </div>
                    </div>`;
                ui.addAuditMsg("bot", "System online. I am your AI Auditor. Please provide a brief overview of your business and the primary operational friction you're facing.");
            } else {
                body.innerHTML = `<h2 style="color:var(--primary)">${type} Node</h2><p>Data node established. Indexing complete.</p>`;
            }
        },

        addAuditMsg: (role, text) => {
            const win = document.getElementById('audit-chat-window');
            if(!win) return;
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerText = text;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
            ui.auditHistory.push({ role, text });
        },

        sendAuditMessage: async () => {
            const input = document.getElementById('client-input');
            const val = input.value;
            if(!val) return;
            
            ui.addAuditMsg("user", val);
            input.value = "";
            
            const win = document.getElementById('audit-chat-window');
            const loading = document.createElement('div');
            loading.className = 'msg bot';
            loading.id = 'ai-loading';
            loading.innerText = "[ ANALYZING_SYSTEM_ARCHITECTURE... ]";
            win.appendChild(loading);
            win.scrollTop = win.scrollHeight;

            try {
                const res = await fetch(`${API_BASE}/api/audit`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ history: ui.auditHistory })
                });
                
                const data = await res.json();
                if(document.getElementById('ai-loading')) document.getElementById('ai-loading').remove();
                
                if (res.status === 500) {
                    ui.addAuditMsg("bot", `Uplink Error: ${data.analysis || "Server processing failed."}`);
                } else {
                    ui.addAuditMsg("bot", data.analysis);
                    if (data.status === "complete") {
                        document.getElementById('audit-input-area').innerHTML = `
                            <button class="node-btn" onclick="ui.downloadPDF()" style="width:100%; border-color:var(--snap-pink); color:var(--snap-pink); font-size:0.9rem;">
                                [ DOWNLOAD_EXECUTIVE_AUDIT_VERDICT ]
                            </button>`;
                    }
                }
            } catch (e) {
                if(document.getElementById('ai-loading')) document.getElementById('ai-loading').remove();
                ui.addAuditMsg("bot", "Uplink interrupted. Ensure the backend is active.");
            }
        },

        downloadPDF: () => {
            const reportRaw = ui.auditHistory[ui.auditHistory.length - 1].text;
            const reportHTML = reportRaw
                .replace(/## (.*)/g, '<h2 style="color:#00cca3; border-bottom:1px solid #ddd; padding-bottom:10px; margin-top:35px; text-transform:uppercase; font-size:1.4rem;">$1</h2>')
                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                .replace(/\n/g, '<br>');

            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                <head>
                    <title>AI Audit Report - Jonathan Taylor</title>
                    <style>
                        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 70px; color: #1a1a1a; line-height: 1.8; max-width: 850px; margin: auto; }
                        .header { border-left: 8px solid #00cca3; padding-left: 30px; margin-bottom: 60px; }
                        .stamp { color: #bc005e; font-weight: bold; letter-spacing: 4px; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 12px; }
                        h1 { font-size: 2.8rem; margin: 0; letter-spacing: -1.5px; text-transform: uppercase; color: #111; }
                        .meta { font-size: 0.95rem; color: #555; margin-top: 20px; font-family: monospace; }
                        .content { font-size: 1.15rem; text-align: justify; }
                        .footer { margin-top: 80px; font-size: 0.8rem; color: #999; border-top: 1px solid #eee; padding-top: 30px; text-align: center; }
                    </style>
                </head>
                <body>
                    <div class="header">
                        <div class="stamp">[ STATUS: ARCHITECT_VERIFIED_2026 ]</div>
                        <h1>AI Strategic Audit</h1>
                        <div class="meta">
                            <b>LEAD ARCHITECT:</b> JONATHAN TAYLOR<br>
                            <b>DATE:</b> ${new Date().toLocaleDateString()}<br>
                            <b>SYSTEM_ID:</b> STRATEGIC_ENGINE_V1.27
                        </div>
                    </div>
                    <div class="content">${reportHTML}</div>
                    <div class="footer">Proprietary technical analysis for small business optimization. Built for high-velocity agentic orchestration.</div>
                </body>
                </html>
            `);
            printWindow.document.close();
            setTimeout(() => { printWindow.print(); }, 600);
        },

        close: () => { document.getElementById('modal-overlay').style.display = 'none'; },
        
        checkUplink: async () => {
            try {
                const res = await fetch(`${API_BASE}/`);
                if (res.ok) {
                    const status = document.getElementById('status-text');
                    status.innerText = 'UPLINK_ONLINE';
                    status.style.color = '#00cca3';
                }
            } catch (e) {
                document.getElementById('status-text').innerText = 'UPLINK_OFFLINE';
            }
        }
    };

    ui.checkUplink();
    VanillaTilt.init(document.querySelectorAll(".card"), { max: 5, speed: 400, glare: true, "max-glare": 0.15 });
</script>
</body>
</html>
