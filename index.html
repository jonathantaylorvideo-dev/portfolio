<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan Taylor | AI Systems Architect</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <style>
        :root { --primary: #00cca3; --bg: #050707; --card: rgba(15,20,20,0.8); --pink: #bc005e; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .bento { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 40px; max-width: 1200px; margin: auto; }
        .card { background: var(--card); border: 1px solid rgba(0,255,163,0.1); border-radius: 24px; padding: 30px; cursor: pointer; transition: 0.4s; position: relative; overflow: hidden; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,255,163,0.1); }
        .hero { grid-column: span 3; }
        #status { font-family: monospace; font-size: 0.7rem; color: var(--pink); margin-bottom: 10px; }
        
        /* Modal & Vault */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #0a0f0f; border: 1px solid var(--primary); width: 100%; max-width: 800px; border-radius: 30px; padding: 40px; position: relative; max-height: 80vh; overflow-y: auto; }
        .vault-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .vault-item { aspect-ratio: 16/9; background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #222; }
        .vault-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; filter: grayscale(1); }
        .vault-item:hover img { filter: grayscale(0); transform: scale(1.05); }
        
        #audit-chat { height: 300px; overflow-y: auto; border-bottom: 1px solid #222; margin-bottom: 20px; padding: 10px; }
        input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 10px; outline: none; }
    </style>
</head>
<body>
    <div class="bento">
        <div class="card hero" onclick="ui.open('about')">
            <div id="status">[ SYSTEM_IDLE ]</div>
            <h1 style="margin:0; color:var(--primary);">Jonathan Taylor</h1>
            <p>Multimedia Professional & AI Systems Architect</p>
        </div>
        <div class="card" onclick="ui.open('vault')"><h3>Visual Vault</h3><p>Neural Asset Gallery</p></div>
        <div class="card" onclick="onclick="ui.open('audit')"><h3>AI Auditor</h3><p>Strategy Engine</p></div>
    </div>

    <div id="modal" onclick="ui.close()"><div class="modal-content" id="m-body" onclick="event.stopPropagation()"></div></div>

<script>
    const API_BASE = "/api/audit";
    let history = [];

    const ui = {
        open: (type) => {
            const body = document.getElementById('m-body');
            document.getElementById('modal').style.display = 'flex';
            if(type === 'vault') {
                body.innerHTML = `<h2>Visual Vault</h2><div class="vault-grid">
                    <div class="vault-item"><img src="assets/project1.jpg"></div>
                    <div class="vault-item"><img src="assets/project2.jpg"></div>
                </div>`;
            } else if(type === 'audit') {
                body.innerHTML = `<h2>AI Strategy Audit</h2><div id="audit-chat"></div>
                <input type="text" id="ai-in" placeholder="Describe your business challenge..." onkeypress="if(event.key==='Enter')ui.send()">`;
                ui.addMsg("bot", "Strategic Engine online. Describe your current operation or bottleneck.");
            }
        },
        addMsg: (role, text) => {
            const chat = document.getElementById('audit-chat');
            chat.innerHTML += `<p><strong>${role.toUpperCase()}:</strong> ${text}</p>`;
            chat.scrollTop = chat.scrollHeight;
        },
        send: async () => {
            const el = document.getElementById('ai-in');
            const val = el.value; if(!val) return;
            ui.addMsg("user", val);
            el.value = "";
            history.push({role: 'user', text: val});

            try {
                const res = await fetch(API_BASE, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ history })
                });
                const data = await res.json();
                ui.addMsg("bot", data.analysis);
                if(data.status === 'complete') ui.addMsg("bot", "✅ Audit Complete. Finalizing Report...");
            } catch(e) { ui.addMsg("bot", "Uplink Error. Check Console."); }
        },
        close: () => document.getElementById('modal').style.display = 'none'
    };
    VanillaTilt.init(document.querySelectorAll(".card"), { max: 5, speed: 400 });
</script>
</body>
</html>
