<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan D. Taylor | AI Architect</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    
    <style>
        :root { 
            --primary: #00ffcc; 
            --bg: #050505; 
            --card: rgba(10, 10, 10, 0.5); /* 50% transparent to see video */
            --text: #ffffff; 
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); color: var(--text);
            overflow-x: hidden;
        }

        /* --- LAYER 1: 🎥 VIDEO BACKGROUND --- */
        .video-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; overflow: hidden; 
            background: #0a1a1a; /* DEBUG COLOR: If you see dark teal, the video path is the issue */
        }
        .video-background video {
            min-width: 100%; min-height: 100%;
            object-fit: cover; opacity: 0.5; 
            filter: grayscale(100%) contrast(110%);
        }

        /* --- LAYER 2: 📺 SCANLINES --- */
        .video-background::after {
            content: "";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; z-index: -1; 
        }

        /* --- LAYER 3: UI --- */
        .wrapper { position: relative; z-index: 10; max-width: 1200px; margin: 0 auto; padding: 60px 20px; }
        .bento-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; }

        .card { 
            background: var(--card); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; padding: 35px;
            transform-style: preserve-3d;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.8);
            transition: border-color 0.3s ease, box-shadow 0.4s ease;
        }

        .card:hover { border-color: var(--primary); z-index: 50; box-shadow: 0 40px 100px rgba(0, 0, 0, 1); }

        .hero-card { grid-column: span 3; cursor: pointer; }
        .hero-card h1 { font-size: 3.5rem; margin: 0; color: var(--primary); text-transform: uppercase; transform: translateZ(60px); }
        .hero-card p { transform: translateZ(30px); opacity: 0.9; }

        .audit-card { grid-column: span 2; border: 1px solid var(--primary); }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; background: #333; }
        .online-dot { background: var(--primary); box-shadow: 0 0 15px var(--primary); }

        /* MODALS */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); justify-content: center; align-items: center; }
        .modal-content { background: #111; width: 90%; max-width: 700px; padding: 40px; border-radius: 24px; border: 1px solid #333; position: relative; }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 30px; color: #666; cursor: pointer; }

        input, select, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; margin-top: 10px; }
        button { width: 100%; padding: 15px; margin-top: 20px; background: var(--primary); color: #000; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }

        @media (max-width: 900px) { .bento-grid { grid-template-columns: 1fr; } .hero-card, .audit-card { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="video-background">
        <video id="bgVideo" autoplay muted loop playsinline>
            <source src="./assets/hero-loop.webm" type="video/webm">
            <p>Your browser does not support the video tag.</p>
        </video>
    </div>

    <div class="wrapper">
        <div class="bento-grid">
            <div class="card hero-card" onclick="openModal('about-modal')">
                <h1>Jonathan D. Taylor</h1>
                <p>AI Systems Architect & Agentic Workflow Designer</p>
                <small style="color: var(--primary)">[ INITIALIZE PROFILE ]</small>
            </div>

            <div class="card">
                <h3>Node Status</h3>
                <div id="status-dot" class="status-dot"></div>
                <span id="status-text">HANDSHAKING...</span>
            </div>

            <div class="card audit-card">
                <h3>⚡ Strategy Audit</h3>
                <form id="auditForm">
                    <input type="text" id="bizName" placeholder="Business Name" required>
                    <textarea id="bottleneck" placeholder="Bottleneck" rows="2" required></textarea>
                    <button type="submit" id="submitBtn" disabled>Run Audit</button>
                </form>
            </div>

            <div class="card">
                <h3>Creative Engine</h3>
                <p>Uke Gothic & Prog-Folk Noir.</p>
            </div>
        </div>
    </div>

    <div id="about-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('about-modal')">&times;</span>
            <h2>Architect Profile</h2>
            <p>Multimedia systems and AI agentic workflows.</p>
        </div>
    </div>

    <div id="audit-result-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('audit-result-modal')">&times;</span>
            <div id="audit-text-content"></div>
        </div>
    </div>

<script>
    const API_BASE = "https://ai-strategy-engine.onrender.com";

    const haptic = {
        click: () => { if (navigator.vibrate) navigator.vibrate(12); },
        success: () => { if (navigator.vibrate) navigator.vibrate([30, 60, 30]); }
    };

    VanillaTilt.init(document.querySelectorAll(".card"), {
        max: 12, speed: 800, glare: true, "max-glare": 0.4, perspective: 1200, scale: 1.04
    });

    // 🎥 FORCED PLAYBACK START
    const video = document.getElementById('bgVideo');
    const startVideo = () => { video.play().catch(() => {}); };
    window.addEventListener('load', startVideo);
    document.body.addEventListener('click', startVideo, { once: true });

    function openModal(id) { haptic.click(); document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    async function checkConnection() {
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');
        const btn = document.getElementById('submitBtn');
        try {
            const res = await fetch(`${API_BASE}/api/status`);
            if (res.ok) {
                dot.classList.add('online-dot');
                text.innerText = "NODE ONLINE";
                btn.disabled = false;
            }
        } catch (err) { text.innerText = "WAITING..."; }
    }

    document.getElementById('auditForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        haptic.click();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "ANALYZING...";
        try {
            const res = await fetch(`${API_BASE}/api/generate-audit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    businessName: document.getElementById('bizName').value,
                    bottleneck: document.getElementById('bottleneck').value
                })
            });
            const data = await res.json();
            haptic.success();
            document.getElementById('audit-text-content').innerHTML = `<h2>Audit Results</h2>` + data.audit;
            openModal('audit-result-modal');
        } catch (error) { alert("Timeout."); }
        finally { btn.innerText = "Run Audit"; }
    });

    checkConnection();
</script>
</body>
</html>
