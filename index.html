<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jonathan Taylor | AI Systems Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --neon-teal: #00f2ff;
            --neon-pink: #ff007f;
        }
        body { background-color: #050505; color: #e2e8f0; }
        
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: minmax(160px, auto);
            gap: 1.5rem;
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .bento-card {
            background: rgba(20, 20, 25, 0.6);
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 2rem;
            backdrop-filter: blur(12px);
            padding: 2rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .bento-card:hover {
            border-color: var(--neon-teal);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
            transform: translateY(-5px);
        }

        /* Scan Overlay */
        #scan-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 50;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: var(--neon-teal);
            text-shadow: 0 0 10px var(--neon-teal);
        }

        #vault-preview {
            width: 100%;
            height: 240px;
            object-fit: cover;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .neon-text-teal { color: var(--neon-teal); }
        .neon-text-pink { color: var(--neon-pink); }
        
        @media (max-width: 768px) {
            .bento-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="bento-grid">
        <div class="bento-card col-span-2 flex flex-col justify-end">
            <h1 class="text-4xl font-bold tracking-tighter neon-text-teal">JONATHAN TAYLOR</h1>
            <p class="text-slate-500 font-mono text-sm mt-2 uppercase tracking-widest">AI Systems Architect // Vibe Coder</p>
        </div>

        <div class="bento-card col-span-2 row-span-2">
            <div id="scan-overlay"> [ INITIALIZING_HANDSHAKE... ] </div>
            <h3 class="neon-text-pink font-mono text-xs mb-4 tracking-widest">VISUAL_VAULT_v2.0</h3>
            
            <video id="vault-preview" autoplay playsinline muted class="bg-black"></video>
            
            <div id="scan-result" class="mt-4 p-4 bg-white/5 rounded-xl border border-white/10 hidden">
                <p id="res-name" class="text-white font-bold text-lg"></p>
                <p id="res-lore" class="text-xs text-slate-400 mt-1 italic"></p>
                <div class="flex justify-between mt-3 text-[10px] font-mono uppercase">
                    <span class="neon-text-teal">Grade: <span id="res-grade">--</span></span>
                    <span class="neon-text-pink">Value: <span id="res-value">--</span></span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mt-6">
                <button onclick="ui.startCamera()" class="border border-cyan-500/30 text-cyan-400 py-3 rounded-xl text-xs font-bold hover:bg-cyan-500/10 transition">ACTIVATE_LENS</button>
                <button onclick="ui.captureAndScan()" class="bg-cyan-500 text-black py-3 rounded-xl text-xs font-bold hover:bg-white transition">CAPTURE_SCAN</button>
            </div>
        </div>

        <div class="bento-card">
            <h3 class="text-slate-500 font-mono text-[10px] mb-2 uppercase">Core_Focus</h3>
            <p class="text-sm">Agentic Workflows & Infrastructure Tracking</p>
        </div>

        <div class="bento-card">
            <h3 class="text-slate-500 font-mono text-[10px] mb-2 uppercase">Latest_Deploy</h3>
            <p class="text-sm font-bold">Fiji Infrastructure Tracker</p>
        </div>
    </div>

    <script>
        const ui = {
            startCamera: async () => {
                const video = document.getElementById('vault-preview');
                document.getElementById('scan-result').classList.add('hidden');
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "environment" }, 
                        audio: false 
                    });
                    video.srcObject = stream;
                } catch (err) {
                    console.error("Camera Error:", err);
                }
            },

            captureAndScan: () => {
                const video = document.getElementById('vault-preview');
                if (!video.srcObject) return;

                const overlay = document.getElementById('scan-overlay');
                overlay.style.display = 'flex';

                // THE WOLVERINE FIX: Downscaling before upload
                const canvas = document.createElement('canvas');
                const maxDim = 800; 
                const scale = Math.min(1, maxDim / Math.max(video.videoWidth, video.videoHeight));
                
                canvas.width = video.videoWidth * scale;
                canvas.height = video.videoHeight * scale;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // 0.5 quality prevents the 500 Payload Limit Error
                const base64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];
                
                // Kill stream to save mobile resources
                video.srcObject.getTracks().forEach(track => track.stop());
                
                ui.runRealScan(base64);
            },

            runRealScan: async (base64Data) => {
                const overlay = document.getElementById('scan-overlay');
                try {
                    const response = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: base64Data })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error);

                    overlay.style.display = 'none';
                    document.getElementById('scan-result').classList.remove('hidden');
                    document.getElementById('res-name').innerText = data.name;
                    document.getElementById('res-grade').innerText = data.grade;
                    document.getElementById('res-value').innerText = data.value;
                    document.getElementById('res-lore').innerText = data.lore;

                } catch (err) {
                    overlay.innerText = "[ CONNECTION_ERROR ]";
                    console.error(err);
                    setTimeout(() => { overlay.style.display = 'none'; }, 2000);
                }
            }
        };
    </script>
</body>
</html>
