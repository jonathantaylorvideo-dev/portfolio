<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan D. Taylor | AI Architect</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    
    <style>
        :root { 
            --primary: #00ffcc; 
            --card-bg: rgba(5, 12, 12, 0.8); 
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: #000; color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        /* --- 🌃 PARALLAX BACKGROUND --- */
        #city-bg {
            position: fixed; top: -10%; left: -10%; width: 120%; height: 120%;
            background: url('assets/city.png') no-repeat center center;
            background-size: cover; z-index: -3;
            will-change: transform;
        }

        /* --- 🎥 VIDEO OVERLAY --- */
        .video-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; pointer-events: none;
            mix-blend-mode: screen; opacity: 0.3;
        }
        video { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); }

        /* --- 🍱 BENTO INTERFACE --- */
        .wrapper { 
            position: relative; z-index: 10; height: 100vh; 
            display: flex; align-items: center; justify-content: center;
        }
        
        .bento-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 25px; width: 90%; max-width: 1100px;
        }

        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 255, 204, 0.25);
            border-radius: 28px; padding: 40px;
            transform-style: preserve-3d;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9);
            transition: border-color 0.3s ease;
        }

        .card:hover { border-color: var(--primary); }

        .hero { grid-column: span 3; cursor: pointer; }
        .hero h1 { 
            font-size: 3.8rem; margin: 0; color: var(--primary); 
            transform: translateZ(80px);
            text-shadow: 0 0 25px rgba(0, 255, 204, 0.4);
        }

        .tag { font-family: monospace; color: var(--primary); font-size: 0.8rem; letter-spacing: 2px; }

        @media (max-width: 900px) { .bento-grid { grid-template-columns: 1fr; } .hero { grid-column: span 1; } }
    </style>
</head>
<body>

    <div id="city-bg"></div>

    <div class="video-layer">
        <video id="bgVideo" autoplay muted loop playsinline>
            <source src="assets/hero-loop.webm" type="video/webm">
        </video>
    </div>

    <div class="wrapper">
        <div class="bento-grid">
            
            <div class="card hero" data-tilt>
                <span class="tag">[ ARCHITECT_ID ]</span>
                <h1>Jonathan D. Taylor</h1>
                <p style="transform: translateZ(40px); opacity: 0.8;">AI Systems Architect & Workflow Designer</p>
            </div>

            <div class="card" data-tilt>
                <h3>System</h3>
                <p style="font-size: 0.85rem; opacity: 0.6;">Node_01: Active</p>
            </div>

            <div class="card" data-tilt style="grid-column: span 2;">
                <h3>Strategy Audit</h3>
                <p style="font-size: 0.9rem; margin-bottom: 20px;">Ready to optimize your creative workflow?</p>
                <button style="width:100%; padding:15px; background:var(--primary); color:black; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">START_AUDIT</button>
            </div>

            <div class="card" data-tilt>
                <h3>Audio Lab</h3>
                <p style="font-size: 0.85rem;">Prog-Folk Noir</p>
            </div>

        </div>
    </div>

<script>
    // Initialize 3D Tilt
    VanillaTilt.init(document.querySelectorAll(".card"), {
        max: 12, speed: 1000, glare: true, "max-glare": 0.4, perspective: 1000, scale: 1.05
    });

    // Parallax Background Logic
    const bg = document.getElementById('city-bg');
    document.addEventListener('mousemove', (e) => {
        const x = (window.innerWidth / 2 - e.pageX) / 30;
        const y = (window.innerHeight / 2 - e.pageY) / 30;
        bg.style.transform = `translate(${x}px, ${y}px)`;
    });

    // Force Video Playback
    const v = document.getElementById('bgVideo');
    window.addEventListener('load', () => v.play().catch(() => {}));
    document.body.addEventListener('click', () => v.play(), {once:true});
</script>
</body>
</html>
