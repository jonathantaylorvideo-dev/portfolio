<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan D. Taylor | AI Architect</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    
    <style>
        :root { --primary: #00ffcc; --card-bg: rgba(5, 12, 12, 0.9); }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background-color: #000;
            /* 🏙️ DIRECT PATH - NO LAYERS */
            background-image: url('assets/city.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            background-attachment: fixed;
            color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        .wrapper { 
            height: 100vh; width: 100vw;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.6); /* This ensures the text is readable */
        }
        
        .bento-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 25px; width: 90%; max-width: 800px;
        }

        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 20px; padding: 35px;
            transform-style: preserve-3d;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        }

        .hero { grid-column: span 2; }
        h1 { font-size: 3rem; margin: 0; color: var(--primary); }
        .tag { font-family: monospace; color: var(--primary); font-size: 0.8rem; }

        @media (max-width: 600px) { .bento-grid { grid-template-columns: 1fr; } .hero { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="bento-grid">
            
            <div class="card hero" data-tilt>
                <span class="tag">[ IDENTITY_LOCKED ]</span>
                <h1 style="margin-top: 10px;">Jonathan D. Taylor</h1>
                <p style="opacity: 0.8; font-size: 1.1rem;">AI Systems Architect & Workflow Designer</p>
            </div>

            <div class="card" data-tilt>
                <h3>System Status</h3>
                <p class="tag">ACTIVE_NODE_01</p>
            </div>

            <div class="card" data-tilt>
                <h3>Creative Lab</h3>
                <p style="font-size: 0.9rem; opacity: 0.8;">Prog-Folk Noir</p>
            </div>

        </div>
    </div>

<script>
    // Only run if the library loaded correctly
    if (window.VanillaTilt) {
        VanillaTilt.init(document.querySelectorAll(".card"), {
            max: 10, speed: 400, glare: true, "max-glare": 0.3
        });
    }
</script>
</body>
</html>
