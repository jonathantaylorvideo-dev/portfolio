<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan D. Taylor | AI Architect</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <style>
        :root { --primary: #00cca3; --card-bg: rgba(7, 10, 10, 0.92); }
        body, html { margin: 0; padding: 0; min-height: 100vh; background: #000 url('assets/city.png') no-repeat center center fixed; background-size: cover; color: #d1d1d1; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .overlay { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, transparent 10%, rgba(0,0,0,0.85) 100%); }
        .bento-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 90%; max-width: 1100px; }
        .card { background: var(--card-bg); backdrop-filter: blur(25px); border: 1px solid rgba(0, 204, 163, 0.1); border-radius: 22px; padding: 30px; cursor: pointer; transition: 0.4s; }
        .hero { grid-column: span 3; }
        .hero h1 { font-size: 3.2rem; margin: 0; color: var(--primary); }
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.96); display: none; z-index: 999; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: #050808; border: 1px solid rgba(0,204,163,0.2); padding: 35px; border-radius: 28px; width: 95%; max-width: 600px; }
        .node-btn { padding: 10px 20px; background: transparent; border: 1px solid var(--primary); color: var(--primary); font-family: monospace; cursor: pointer; border-radius: 4px; transition: 0.3s; }
        input[type="text"] { width: 100%; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid #222; color: #fff; border-radius: 8px; font-family: monospace; outline: none; }
        #audit-chat-window { height: 280px; overflow-y: auto; margin-bottom: 20px; scrollbar-width: thin; }
        .msg { margin-bottom: 15px; font-size: 0.85rem; line-height: 1.4; }
        .msg.bot { color: var(--primary); border-left: 2px solid var(--primary); padding-left: 10px; }
        .msg.user { color: #fff; text-align: right; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="overlay">
        <div class="bento-grid">
            <div class="card hero" onclick="ui.open('About')">
                <div id="status-text" style="font-family:monospace; font-size:0.5rem; opacity:0.6; text-align:right;">UPLINK_OFFLINE</div>
                <h1>Jonathan D. Taylor</h1>
                <p>AI Systems Architect & Agentic Workflow Designer</p>
            </div>
            <div class="card" onclick="ui.open('Audit')"><h3>AI Auditor</h3></div>
            <div class="card" style="grid-column: span 2;" onclick="ui.open('Work')"><h3>Portfolio</h3></div>
            <div class="card" onclick="ui.open('Vault')"><h3>Visual Vault</h3></div>
            <div class="card" onclick="ui.open('Terminal')"><h3>Terminal</h3></div>
        </div>
    </div>

    <div id="modal-overlay" onclick="ui.close()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-body"></div>
            <div style="text-align:center; margin-top:30px; cursor:pointer; color:var(--primary); font-family:monospace; font-size:0.65rem;" onclick="ui.close()">[ TERMINATE_SESSION ]</div>
        </div>
    </div>

<script>
    const API_BASE = "https://ai-strategy-engine.onrender.com";

    const ui = {
        auditHistory: [],
        open: (type) => {
            const body = document.getElementById('modal-body');
            document.getElementById('modal-overlay').style.display = 'flex';
            
            if (type === 'Audit') {
                ui.auditHistory = []; 
                body.innerHTML = `
                    <div id="audit-chat-window"></div>
                    <div id="audit-input-area">
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="client-input" placeholder="Enter diagnostic data..." onkeypress="if(event.key==='Enter') ui.sendAuditMessage()">
                            <button class="node-btn" onclick="ui.sendAuditMessage()">SEND</button>
                        </div>
                    </div>`;
                ui.addAuditMsg("bot", "System online. I am your AI Auditor. Describe the primary operational friction in your current business workflow.");
            } else { body.innerHTML = `<h2>${type} Node</h2><p>Secure link established.</p>`; }
        },

        addAuditMsg: (role, text) => {
            const win = document.getElementById('audit-chat-window');
            if(!win) return;
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerText = text;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
            ui.auditHistory.push({ role, text });
        },

        sendAuditMessage: async () => {
            const input = document.getElementById('client-input');
            const val = input.value;
            if(!val) return;
            ui.addAuditMsg("user", val);
            input.value = "";
            try {
                const res = await fetch(`${API_BASE}/api/audit`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ history: ui.auditHistory })
                });
                const data = await res.json();
                ui.addAuditMsg("bot", data.analysis);

                if (data.status === "complete") {
                    document.getElementById('audit-input-area').innerHTML = `
                        <button class="node-btn" onclick="ui.downloadPDF()" style="width:100%; margin-top:10px; border-color:#bc005e; color:#bc005e;">
                            [ DOWNLOAD_PERSONALIZED_VERDICT ]
                        </button>`;
                }
            } catch (e) { ui.addAuditMsg("bot", "Uplink failed. Check backend status."); }
        },

        downloadPDF: () => {
            const report = ui.auditHistory[ui.auditHistory.length - 1].text;
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                    <head>
                        <style>
                            body { font-family: 'Courier New', monospace; padding: 50px; line-height: 1.6; color: #1a1a1a; }
                            .header { border-bottom: 2px solid #00cca3; padding-bottom: 20px; margin-bottom: 30px; }
                            h1 { color: #00cca3; margin: 0; }
                            .stamp { color: #bc005e; font-weight: bold; font-size: 0.8rem; margin-bottom: 10px; }
                            .content { white-space: pre-wrap; font-size: 1.1rem; }
                            .footer { margin-top: 50px; font-size: 0.7rem; opacity: 0.6; border-top: 1px solid #eee; padding-top: 20px; }
                        </style>
                    </head>
                    <body>
                        <div class="header">
                            <div class="stamp">[ STATUS: ARCHITECT_VERIFIED ]</div>
                            <h1>AI ARCHITECTURAL AUDIT</h1>
                            <p><b>Lead:</b> Jonathan Taylor | AI Systems Architect</p>
                            <p><b>Date:</b> ${new Date().toLocaleDateString()}</p>
                        </div>
                        <div class="content">${report}</div>
                        <div class="footer">Analysis generated via the Taylor Strategic Engine [v1.2]</div>
                    </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        },

        close: () => { document.getElementById('modal-overlay').style.display = 'none'; },
        
        checkUplink: async () => {
            try {
                const res = await fetch(`${API_BASE}/`);
                if (res.ok) document.getElementById('status-text').innerText = 'UPLINK_ONLINE';
            } catch (e) {}
        }
    };

    ui.checkUplink();
    VanillaTilt.init(document.querySelectorAll(".card"), { max: 5, speed: 400, glare: true, "max-glare": 0.1 });
</script>
</body>
</html>
