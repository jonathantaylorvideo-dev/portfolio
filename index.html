<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan D. Taylor | AI Architect</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    
    <style>
        :root { --primary: #00ffcc; --card: rgba(10, 20, 20, 0.8); }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: #050505; 
            color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        /* --- 🌃 THE BACKGROUND --- */
        #parallax-bg {
            position: fixed;
            top: -10%; left: -10%;
            width: 120%; height: 120%;
            /* 🚨 I am using the EXACT name from your screenshot here */
            background: url('assets/Gemini_Generated_Image_spg2qfspg2qfspg2.jpg') no-repeat center center;
            background-size: cover;
            z-index: -3;
        }

        .video-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; pointer-events: none; opacity: 0.3;
        }
        video { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); }

        /* --- 🍱 UI --- */
        .wrapper { 
            position: relative; z-index: 10; 
            height: 100vh; width: 100vw;
            display: flex; align-items: center; justify-content: center;
        }
        
        .bento-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 20px; max-width: 1100px; width: 90%;
        }

        .card { 
            background: var(--card); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 20px; padding: 30px;
            transform-style: preserve-3d;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        }

        .hero { grid-column: span 3; }
        .hero h1 { font-size: 3rem; margin: 0; color: var(--primary); transform: translateZ(50px); }

        @media (max-width: 850px) { .bento-grid { grid-template-columns: 1fr; } .hero { grid-column: span 1; } }
    </style>
</head>
<body>

    <div id="parallax-bg"></div>

    <div class="video-layer">
        <video id="bgVideo" autoplay muted loop playsinline>
            <source src="assets/hero-loop.webm" type="video/webm">
        </video>
    </div>

    <div class="wrapper">
        <div class="bento-grid">
            <div class="card hero" data-tilt>
                <h1>Jonathan D. Taylor</h1>
                <p>AI Systems Architect</p>
                <p style="font-size: 0.8rem; color: var(--primary);">[ SYSTEM STATUS: ONLINE ]</p>
            </div>
            <div class="card" data-tilt><h3>Node</h3><p>Active</p></div>
            <div class="card" data-tilt style="grid-column: span 2;"><h3>Audit</h3><p>Ready...</p></div>
            <div class="card" data-tilt><h3>Lab</h3><p>Creative</p></div>
        </div>
    </div>

<script>
    // Force wait for images and scripts
    window.onload = function() {
        VanillaTilt.init(document.querySelectorAll(".card"), {
            max: 20,
            speed: 1000,
            glare: true,
            "max-glare": 0.5,
            scale: 1.05
        });

        const bg = document.getElementById('parallax-bg');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 30;
            const y = (window.innerHeight / 2 - e.pageY) / 30;
            bg.style.transform = `translate(${x}px, ${y}px)`;
        });
    };
</script>
</body>
</html>
