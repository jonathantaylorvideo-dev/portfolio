<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jonathan Taylor | AI Systems Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --neon-teal: #00f2ff;
            --neon-pink: #ff007f;
        }
        body { 
            background-color: #050505; 
            color: #e2e8f0; 
            font-family: ui-sans-serif, system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        /* THE BENTO GRID CONFIG */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: minmax(160px, auto);
            gap: 1.5rem;
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .bento-card {
            background: rgba(20, 20, 25, 0.6);
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 2rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 2rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .bento-card:hover {
            border-color: var(--neon-teal);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
            transform: translateY(-5px);
        }

        /* VISUAL VAULT SPECIFICS */
        #vault-preview {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 1.5rem;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .neon-text-teal { color: var(--neon-teal); text-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }
        .neon-text-pink { color: var(--neon-pink); text-shadow: 0 0 10px rgba(255, 0, 127, 0.3); }

        /* LOADING OVERLAY */
        #scan-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 50;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: var(--neon-teal);
            letter-spacing: 0.1em;
        }
        
        @media (max-width: 768px) {
            .bento-grid { grid-template-columns: 1fr; }
            .bento-card { grid-column: span 1 !important; }
        }
    </style>
</head>
<body>

    <div class="bento-grid">
        <div class="bento-card col-span-2 flex flex-col justify-end min-h-[220px]">
            <h1 class="text-5xl font-black tracking-tighter neon-text-teal italic leading-none">JONATHAN TAYLOR</h1>
            <p class="text-slate-500 font-mono text-xs mt-4 uppercase tracking-[0.3em] opacity-80">AI Systems Architect // Vibe Coder</p>
        </div>

        <div class="bento-card col-span-2 row-span-2">
            <div id="scan-overlay"> [ INITIALIZING_HANDSHAKE... ] </div>
            <div class="flex justify-between items-center mb-6">
                <h3 class="neon-text-pink font-mono text-[10px] tracking-[0.4em] uppercase">Visual Vault v2.0</h3>
                <div class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981] animate-pulse"></div>
            </div>
            
            <video id="vault-preview" autoplay playsinline muted></video>
            
            <div id="scan-result" class="mt-6 p-5 bg-white/5 rounded-2xl border border-white/10 hidden transform transition-all duration-500">
                <p id="res-name" class="text-white font-bold text-xl tracking-tight"></p>
                <p id="res-lore" class="text-xs text-slate-400 mt-2 leading-relaxed opacity-80"></p>
                <div class="grid grid-cols-2 gap-4 mt-6 pt-4 border-t border-white/5">
                    <div>
                        <span class="block text-[9px] font-mono uppercase text-slate-500 mb-1">Authenticity_Grade</span>
                        <span id="res-grade" class="text-lg font-bold neon-text-teal italic">--</span>
                    </div>
                    <div>
                        <span class="block text-[9px] font-mono uppercase text-slate-500 mb-1">Market_Valuation</span>
                        <span id="res-value" class="text-lg font-bold neon-text-pink italic">--</span>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-3 mt-auto pt-6">
                <button onclick="ui.startCamera()" class="w-full border border-cyan-500/30 text-cyan-400 py-4 rounded-2xl text-[10px] font-bold tracking-[0.2em] hover:bg-cyan-500/10 transition-all uppercase">Open_Optics</button>
                <button onclick="ui.captureAndScan()" class="w-full bg-cyan-500 text-black py-4 rounded-2xl text-[10px] font-black tracking-[0.2em] hover:bg-white transition-all uppercase">Execute_Scan</button>
            </div>
        </div>

        <div class="bento-card flex flex-col justify-between">
            <h3 class="text-slate-500 font-mono text-[9px] uppercase tracking-widest">Active_Node</h3>
            <p class="text-sm font-medium leading-tight">Fiji Infrastructure Tracker</p>
        </div>

        <div class="bento-card flex flex-col justify-between">
            <h3 class="text-slate-500 font-mono text-[9px] uppercase tracking-widest">System_Sync</h3>
            <div class="flex items-center gap-2">
                <span class="text-2xl font-black neon-text-teal">99%</span>
                <span class="text-[8px] text-slate-500 uppercase">Operational</span>
            </div>
        </div>
    </div>

    <script>
        const ui = {
            startCamera: async () => {
                const video = document.getElementById('vault-preview');
                const resultDiv = document.getElementById('scan-result');
                resultDiv.classList.add('hidden');
                
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "environment" }, 
                        audio: false 
                    });
                    video.srcObject = stream;
                } catch (err) {
                    console.error("Critical: Optics failure.", err);
                }
            },

            captureAndScan: () => {
                const video = document.getElementById('vault-preview');
                if (!video.srcObject) return;

                const overlay = document.getElementById('scan-overlay');
                overlay.style.display = 'flex';

                // WOLVERINE_1_FIX: Aggressive downscale for Vercel 4.5MB Payload limit
                const canvas = document.createElement('canvas');
                const maxDim = 800; 
                const scale = Math.min(1, maxDim / Math.max(video.videoWidth, video.videoHeight));
                
                canvas.width = video.videoWidth * scale;
                canvas.height = video.videoHeight * scale;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // Quality 0.5 ensures handshake success under load
                const base64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];
                
                // Clear hardware tracks
                video.srcObject.getTracks().forEach(track => track.stop());
                
                ui.runRealScan(base64);
            },

            runRealScan: async (base64Data) => {
                const overlay = document.getElementById('scan-overlay');
                try {
                    const response = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: base64Data })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error);

                    overlay.style.display = 'none';
                    const resultDiv = document.getElementById('scan-result');
                    resultDiv.classList.remove('hidden');
                    
                    document.getElementById('res-name').innerText = data.name.toUpperCase();
                    document.getElementById('res-lore').innerText = data.lore;
                    document.getElementById('res-grade').innerText = data.grade;
                    document.getElementById('res-value').innerText = data.value;

                } catch (err) {
                    overlay.innerText = "[ HANDSHAKE_ERROR ]";
                    console.error("Runtime Crash:", err);
                    setTimeout(() => { 
                        overlay.style.display = 'none'; 
                        overlay.innerText = "[ INITIALIZING_HANDSHAKE... ]";
                    }, 2500);
                }
            }
        };
    </script>
</body>
</html>
