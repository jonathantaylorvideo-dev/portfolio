<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan D. Taylor | AI Architect</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <style>
        :root { --primary: #00ffcc; --snap-pink: #ff007f; --card-bg: rgba(5, 12, 12, 0.9); }
        
        body, html { 
            margin: 0; padding: 0; min-height: 100vh; width: 100vw; 
            background: #000 url('assets/city.png') no-repeat center center fixed; 
            background-size: cover; color: #fff; font-family: 'Segoe UI', sans-serif; 
            overflow-x: hidden; 
        }
        
        /* Ensures the Bento Grid is layered above the background image */
        .overlay { 
            position: relative; min-height: 100vh; width: 100vw; 
            display: flex; align-items: center; justify-content: center; 
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%); 
            z-index: 10; 
        }
        
        .bento-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; 
            width: 90%; max-width: 1100px; z-index: 20; 
        }
        
        .card { 
            background: var(--card-bg); backdrop-filter: blur(20px); 
            border: 1px solid rgba(0, 255, 204, 0.2); border-radius: 22px; 
            padding: 30px; transform-style: preserve-3d; cursor: pointer; 
            position: relative; overflow: hidden; transition: border-color 0.3s ease; 
        }
        
        .card:hover { border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); }
        .video-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; opacity: 0.4; mix-blend-mode: screen; filter: grayscale(1); }
        .hero { grid-column: span 3; min-height: 250px; display: flex; flex-direction: column; justify-content: center; }
        .hero h1 { font-size: 3.2rem; margin: 0; color: var(--primary); text-shadow: 0 0 20px rgba(0,255,204,0.5); }
        .tag { font-family: monospace; color: var(--primary); font-size: 0.7rem; letter-spacing: 2px; }

        /* Marvel Snap HUD & Scan Effects */
        @keyframes scanline { 0% { top: 0%; opacity: 0; } 5% { opacity: 1; } 95% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .scan-line { position: absolute; width: 100%; height: 4px; background: linear-gradient(to right, transparent, var(--snap-pink), #fff, var(--snap-pink), transparent); box-shadow: 0 0 15px var(--snap-pink); z-index: 10; animation: scanline 3s linear infinite; pointer-events: none; }
        .bracket { position: absolute; width: 20px; height: 20px; border: 2px solid var(--snap-pink); box-shadow: 0 0 10px var(--snap-pink); z-index: 11; }
        .tl { top: 10px; left: 10px; border-right: 0; border-bottom: 0; }
        .tr { top: 10px; right: 10px; border-left: 0; border-bottom: 0; }
        .bl { bottom: 10px; left: 10px; border-right: 0; border-top: 0; }
        .br { bottom: 10px; right: 10px; border-left: 0; border-top: 0; }
        .hud-text { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); font-family: monospace; font-size: 0.6rem; color: var(--primary); letter-spacing: 2px; z-index: 11; text-transform: uppercase; }

        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; z-index: 999; align-items: center; justify-content: center; }
        .modal-content { background: #070f0f; border: 1px solid var(--primary); padding: 30px; border-radius: 24px; width: 90%; max-width: 550px; text-align: left; position: relative; }
        .input-tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .in-tab { padding: 6px 12px; font-family: monospace; font-size: 0.65rem; cursor: pointer; border: 1px solid transparent; border-radius: 4px; opacity: 0.5; color: #fff; }
        .in-tab.active { border-color: var(--primary); color: var(--primary); opacity: 1; background: rgba(0,255,204,0.1); }
        .vault-panel { display: none; min-height: 220px; }
        .vault-panel.active { display: block; }
        .node-btn { padding:8px 16px; background:transparent; border:1px solid var(--primary); color:var(--primary); font-size:0.6rem; font-weight:bold; font-family:monospace; cursor:pointer; border-radius:4px; transition: 0.2s; }
        .node-btn:hover { background: rgba(0,255,204,0.1); }
        .close-btn { cursor: pointer; color: var(--primary); font-family: monospace; display: block; margin-top: 25px; text-align: center; }
        @media (max-width: 900px) { .bento-grid { grid-template-columns: 1fr; } .hero { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="overlay">
        <div class="bento-grid">
            <div class="card hero" data-tilt onclick="ui.open('About')">
                <video class="video-bg" autoplay muted loop playsinline><source src="assets/hero-loop.webm" type="video/webm"></video>
                <span class="tag">[ IDENTITY_CONFIRMED ]</span>
                <h1>Jonathan D. Taylor</h1>
                <p>AI Systems Architect & Agentic Workflow Designer</p>
            </div>
            
            <div class="card" data-tilt onclick="ui.open('Audit')"><span class="tag">01_AUDIT</span><h3>Strategy Audit</h3><p style="font-size:0.8rem; opacity:0.7;">LGS Bottleneck Analysis</p></div>
            <div class="card" data-tilt style="grid-column: span 2;" onclick="ui.open('Work')"><span class="tag">02_WORK</span><h3>Portfolio</h3><p style="font-size:0.8rem; opacity:0.7;">Adventures of Intrigue Case Study</p></div>
            <div class="card" data-tilt onclick="ui.open('Vault')"><span class="tag">03_VAULT</span><h3>Visual Vault</h3><p style="font-size:0.8rem; opacity:0.7;">AI Hobby Scanning Node</p></div>
            <div class="card" data-tilt onclick="ui.open('Terminal')"><span class="tag">04_LOGS</span><h3>Terminal</h3><p style="font-size:0.8rem; opacity:0.7;">System Logs</p></div>
        </div>
    </div>

    <div id="modal-overlay" onclick="ui.close()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-body"></div>
            <span class="close-btn" onclick="ui.close()">[ EXIT_NODE ]</span>
        </div>
    </div>

<script>
    const ui = {
        open: (type) => {
            const body = document.getElementById('modal-body');
            document.getElementById('modal-overlay').style.display = 'flex';
            if (type === 'Vault') {
                body.innerHTML = `
                    <h2 style="color:var(--primary); margin-bottom:5px; text-transform:uppercase; letter-spacing:3px;">Visual Vault</h2>
                    <p style="font-size:0.7rem; opacity:0.6; margin-bottom:20px; font-family:monospace;">[ SYSTEM_STATUS ]: MULTIMODAL_ACTIVE</p>
                    <div class="input-tabs">
                        <div class="in-tab active" onclick="ui.switchInTab('camera')">TARGET_LENS</div>
                        <div class="in-tab" onclick="ui.switchInTab('upload')">DATA_UPLOAD</div>
                    </div>
                    <div id="camera" class="vault-panel active">
                        <div style="background:#000; border:1px solid rgba(255,0,127,0.3); height:220px; border-radius:12px; position:relative; overflow:hidden; box-shadow: inset 0 0 20px rgba(255,0,127,0.1);">
                            <div class="scan-line"></div>
                            <div class="bracket tl"></div><div class="bracket tr"></div>
                            <div class="bracket bl"></div><div class="bracket br"></div>
                            <div class="hud-text"><span style="color:var(--snap-pink)">●</span> optical_sync_active</div>
                            <video id="vault-preview" autoplay playsinline style="width:100%; height:100%; object-fit:cover; filter: contrast(1.1);"></video>
                            <div style="position:absolute; bottom:15px; left:50%; transform:translateX(-50%); display:flex; gap:10px; z-index:12;">
                                <button class="node-btn" style="border-color:var(--snap-pink); color:var(--snap-pink); font-size:0.55rem;" onclick="ui.activateCamera('user')">FRONT</button>
                                <button class="node-btn" style="background:var(--snap-pink); color:#000; border:none; font-size:0.55rem;" onclick="ui.activateCamera('environment')">REAR</button>
                            </div>
                        </div>
                        <div style="margin-top: 15px;">
                            <label for="user-prompt" style="font-family: monospace; font-size: 0.6rem; color: #888; display: block; margin-bottom: 5px;">[ DATA_AUGMENTATION_PROMPT ]</label>
                            <input type="text" id="user-prompt" placeholder="Augment image data... (e.g. 'Check Grade', 'Fiji Repair')" 
                                style="width: 100%; padding: 10px; background: rgba(10, 20, 20, 0.9); border: 1px solid rgba(0, 255, 204, 0.2); color: #fff; border-radius: 6px; font-family: monospace; font-size: 0.75rem; box-sizing: border-box;">
                        </div>
                        <button class="node-btn" id="snap-btn" style="width:100%; margin-top:15px; display:none; border-color:var(--snap-pink); color:var(--snap-pink); font-size:0.7rem;" onclick="ui.captureAndScan()">[ INITIATE_MULTI_MODAL_SCAN ]</button>
                    </div>
                    <div id="upload" class="vault-panel">
                        <div style="border:1px dashed #333; height:220px; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#555; cursor:pointer;" onclick="document.getElementById('vault-file').click()">
                            <span style="font-family:monospace; font-size:0.7rem;">SELECT_FILE_FOR_ANALYSIS</span>
                        </div>
                    </div>
                    <input type="file" id="vault-file" style="display:none" accept="image/*" onchange="ui.runRealScan(this.files[0])">
                    <div id="vault-results" style="margin-top:20px; display:none; border-top:1px solid #222; padding-top:15px; font-family:monospace;">
                        <p id="scan-status" style="font-size:0.75rem; color:var(--snap-pink);">[ SCANNING_PROTOCOL_ACTIVE ]</p>
                        <div id="vault-data-display" style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:15px;"></div>
                    </div>`;
            } else if (type === 'About') {
                body.innerHTML = `
                    <h2 style="color:var(--primary)">Jonathan D. Taylor</h2>
                    <p style="font-style: italic; color: var(--primary); font-size: 0.9rem;">AI Systems Architect | 42 | St. Louis</p>
                    <p>Building agile AI infrastructure for small businesses with the precision of a solo craftsman.</p>
                    <p style="font-family: monospace; font-size: 0.8rem; background: rgba(0,255,204,0.1); padding: 15px; border-radius: 8px; border-left: 3px solid var(--primary);">
                        > MISSION: Circumnavigation. Balancing technical architecture with blue water sailing.
                    </p>`;
            } else { body.innerHTML = `<h2>Node: ${type}</h2><p>Data stream active.</p>`; }
        },

        switchInTab: (tabId) => {
            document.querySelectorAll('.in-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.vault-panel').forEach(v => v.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        },

        activateCamera: async (mode) => {
            const video = document.getElementById('vault-preview');
            const snapBtn = document.getElementById('snap-btn');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode }, audio: false });
                video.srcObject = stream;
                snapBtn.style.display = 'block';
            } catch (err) { alert("Camera Access Error: " + err.message); }
        },

        captureAndScan: () => {
            const video = document.getElementById('vault-preview');
            const prompt = document.getElementById('user-prompt').value;
            const canvas = document.createElement('canvas');
            const maxDim = 1024;
            const scale = Math.min(1, maxDim / Math.max(video.videoWidth, video.videoHeight));
            
            canvas.width = video.videoWidth * scale;
            canvas.height = video.videoHeight * scale;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const base64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
            video.srcObject.getTracks().forEach(track => track.stop());
            ui.runRealScan(null, base64, prompt);
        },

        runRealScan: async (file, directBase64 = null, userPrompt = "") => {
            const results = document.getElementById('vault-results');
            const statusText = document.getElementById('scan-status');
            const dataBox = document.getElementById('vault-data-display');
            results.style.display = 'block';
            statusText.innerText = "[ COMPRESSING_&_TRANSMITTING ]...";

            try {
                let base64 = directBase64;
                if (file) {
                    const bitmap = await createImageBitmap(file);
                    const canvas = document.createElement('canvas');
                    const scale = Math.min(1, 1024 / Math.max(bitmap.width, bitmap.height));
                    canvas.width = bitmap.width * scale; canvas.height = bitmap.height * scale;
                    canvas.getContext('2d').drawImage(bitmap, 0, 0, canvas.width, canvas.height);
                    base64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                }

                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64, prompt: userPrompt })
                });

                if (!response.ok) throw new Error(`HTTP_${response.status}`);
                const data = await response.json();

                statusText.innerText = `[ ANALYSIS_COMPLETE ]: ${data.name || 'Identified'}`;
                dataBox.innerHTML = `
                    <div style="font-size:0.7rem; color:#888;">GRADE: <span style="color:#fff;">${data.grade || '--'}</span></div>
                    <div style="font-size:0.7rem; color:#888;">VALUE: <span style="color:#fff;">${data.value || '--'}</span></div>
                    <div style="grid-column: span 2; font-size:0.65rem; color:var(--primary); margin-top:5px; line-height:1.4;">${data.lore || ''}</div>`;
            } catch (err) { statusText.innerText = `[ SCAN_FAILED ]: ${err.message}`; }
        },

        close: () => { 
            const video = document.getElementById('vault-preview');
            if(video && video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('modal-overlay').style.display = 'none'; 
        }
    };

    document.addEventListener('mousemove', (e) => { 
        const x = (window.innerWidth / 2 - e.pageX) / 50; 
        const y = (window.innerHeight / 2 - e.pageY) / 50; 
        document.body.style.backgroundPosition = `calc(50% + ${x}px) calc(50% + ${y}px)`; 
    });

    VanillaTilt.init(document.querySelectorAll(".card"), { max: 8, speed: 1000, glare: true, "max-glare": 0.2 });
</script>
</body>
</html>
