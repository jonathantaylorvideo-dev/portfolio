<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan D. Taylor | AI Architect</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    
    <style>
        :root { 
            --primary: #00ffcc; 
            --card-bg: rgba(5, 12, 12, 0.85); 
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background-color: #000; /* Fallback */
            color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        /* --- 🌃 THE CITY LAYER (FORCE LOAD) --- */
        #city-layer {
            position: fixed; top: -10%; left: -10%; width: 120%; height: 120%;
            /* 🚨 PATH CHECK: assets/city.png */
            background: url('assets/city.png') no-repeat center center !important;
            background-size: cover !important;
            z-index: -5;
            will-change: transform;
        }

        /* --- 🎥 VIDEO BLEND --- */
        #video-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -4; pointer-events: none;
            mix-blend-mode: screen; opacity: 0.3;
        }
        video { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); }

        /* --- 📺 SCANLINES (Visual Glue) --- */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px;
            z-index: -3; pointer-events: none;
        }

        /* --- 🍱 INTERFACE --- */
        .wrapper { 
            position: relative; z-index: 10; height: 100vh; 
            display: flex; align-items: center; justify-content: center;
        }
        
        .bento-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 25px; width: 90%; max-width: 1100px;
        }

        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 28px; padding: 40px;
            transform-style: preserve-3d;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9);
        }

        .hero { grid-column: span 3; }
        .hero h1 { 
            font-size: 3.8rem; margin: 0; color: var(--primary); 
            transform: translateZ(80px);
            text-shadow: 0 0 25px rgba(0, 255, 204, 0.4);
        }

        @media (max-width: 900px) { .bento-grid { grid-template-columns: 1fr; } .hero { grid-column: span 1; } }
    </style>
</head>
<body>

    <div id="city-layer"></div>

    <div id="video-layer">
        <video id="bgVideo" autoplay muted loop playsinline>
            <source src="assets/hero-loop.webm" type="video/webm">
        </video>
    </div>

    <div class="scanlines"></div>

    <div class="wrapper">
        <div class="bento-grid">
            <div class="card hero" data-tilt>
                <h1 style="margin-bottom: 10px;">Jonathan D. Taylor</h1>
                <p style="opacity: 0.8; font-size: 1.2rem;">AI Systems Architect</p>
                <p style="color: var(--primary); font-family: monospace;">[ SYSTEM: ONLINE ]</p>
            </div>
            
            <div class="card" data-tilt>
                <h3>Status</h3>
                <p style="font-size: 0.8rem;">Node 01: Active</p>
            </div>

            <div class="card" data-tilt style="grid-column: span 2;">
                <h3>Strategy Audit</h3>
                <button style="width:100%; padding:15px; background:var(--primary); border:none; border-radius:10px; font-weight:bold; cursor:pointer;">START_AUDIT</button>
            </div>

            <div class="card" data-tilt>
                <h3>Lab</h3>
                <p style="font-size: 0.8rem;">Noir Engine</p>
            </div>
        </div>
    </div>

<script>
    // Initialize Tilt
    VanillaTilt.init(document.querySelectorAll(".card"), {
        max: 12, speed: 1000, glare: true, "max-glare": 0.4, perspective: 1000, scale: 1.05
    });

    // Parallax logic for the city layer
    const city = document.getElementById('city-layer');
    document.addEventListener('mousemove', (e) => {
        const x = (window.innerWidth / 2 - e.pageX) / 30;
        const y = (window.innerHeight / 2 - e.pageY) / 30;
        city.style.transform = `translate(${x}px, ${y}px)`;
    });

    // Playback fix
    const v = document.getElementById('bgVideo');
    window.onload = () => v.play().catch(() => {});
    document.body.addEventListener('click', () => v.play(), {once:true});
</script>
</body>
</html>
