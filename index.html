<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan D. Taylor | AI Architect</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    
    <style>
        :root { 
            --primary: #00ffcc; 
            --card-bg: rgba(5, 12, 12, 0.9); 
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background-color: #000; 
            /* 🏙️ POINTING BACK TO YOUR ORIGINAL AI IMAGE */
            background: #000 url('assets/city.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        .wrapper { 
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 150%);
        }
        
        .bento-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 25px; width: 90%; max-width: 900px;
        }

        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 24px; padding: 40px;
            transform-style: preserve-3d;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9);
        }

        .hero { grid-column: span 2; }
        .hero h1 { font-size: 3.5rem; margin: 0; color: var(--primary); transform: translateZ(60px); }
        .tag { font-family: monospace; color: var(--primary); font-size: 0.8rem; letter-spacing: 2px; }

        @media (max-width: 850px) { .bento-grid { grid-template-columns: 1fr; } .hero { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="bento-grid">
            <div class="card hero" data-tilt>
                <span class="tag">[ IDENTITY_CONFIRMED ]</span>
                <h1 style="margin-top: 10px;">Jonathan D. Taylor</h1>
                <p style="opacity: 0.8; font-size: 1.2rem;">AI Systems Architect & Agentic Workflow Designer</p>
            </div>

            <div class="card" data-tilt>
                <h3>System Status</h3>
                <p class="tag">LIVE_NODE_01</p>
            </div>

            <div class="card" data-tilt>
                <h3>Creative Lab</h3>
                <p style="font-size: 0.9rem; opacity: 0.8;">Prog-Folk Noir</p>
            </div>
        </div>
    </div>

<script>
    VanillaTilt.init(document.querySelectorAll(".card"), {
        max: 15, speed: 1000, glare: true, "max-glare": 0.4, scale: 1.05
    });
</script>
</body>
</html>
