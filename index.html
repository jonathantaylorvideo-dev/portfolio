<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jonathan Taylor | AI Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom "Vibe" styling for the Bento Grid */
        .bento-card {
            background: rgba(15, 15, 20, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .bento-card:hover {
            border-color: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }
        #vault-preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            background: #000;
        }
        .scanning-loader {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            color: #0ff;
            font-family: monospace;
            z-index: 10;
        }
    </style>
</head>
<body class="bg-black text-slate-300 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-4">
        
        <div class="md:col-span-2 bento-card p-6 rounded-3xl relative overflow-hidden">
            <div id="scan-overlay" class="scanning-loader"> [ SCANNING_PAYLOAD... ] </div>
            
            <h3 class="text-cyan-400 font-mono mb-4 text-sm tracking-widest uppercase">Visual Vault v2.0</h3>
            
            <div class="relative">
                <video id="vault-preview" autoplay playsinline muted></video>
                <div id="scan-result" class="mt-4 p-4 bg-black/50 rounded-lg border border-cyan-900/50 hidden">
                    <p id="res-name" class="text-white font-bold text-lg"></p>
                    <p id="res-lore" class="text-xs text-slate-400 mt-1 italic"></p>
                    <div class="flex justify-between mt-3 text-[10px] font-mono uppercase tracking-tighter">
                        <span class="text-cyan-500">Grade: <span id="res-grade">--</span></span>
                        <span class="text-emerald-500">Value: <span id="res-value">--</span></span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2 mt-4">
                <button onclick="ui.startCamera()" class="bg-cyan-900/30 border border-cyan-500/50 text-cyan-400 py-2 rounded-lg text-xs hover:bg-cyan-500 hover:text-black transition">ACTIVATE_LENS</button>
                <button onclick="ui.captureAndScan()" class="bg-white text-black py-2 rounded-lg text-xs font-bold hover:bg-cyan-400 transition">CAPTURE_SCAN</button>
            </div>
        </div>

        <div class="bento-card p-6 rounded-3xl">
            <h3 class="text-slate-500 font-mono text-xs mb-2">PROJECTS</h3>
            <p class="text-sm">Fiji Infrastructure Tracker</p>
        </div>
        <div class="bento-card p-6 rounded-3xl">
            <h3 class="text-slate-500 font-mono text-xs mb-2">VIBE</h3>
            <p class="text-sm">Cyberpunk / Industrial</p>
        </div>

    </div>

    <script>
        const ui = {
            startCamera: async () => {
                const video = document.getElementById('vault-preview');
                document.getElementById('scan-result').classList.add('hidden');
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "environment" }, 
                        audio: false 
                    });
                    video.srcObject = stream;
                } catch (err) {
                    alert("Camera access denied or not found.");
                }
            },

            captureAndScan: () => {
                const video = document.getElementById('vault-preview');
                if (!video.srcObject) return alert("Activate lens first.");

                const canvas = document.createElement('canvas');
                document.getElementById('scan-overlay').style.display = 'flex';

                // ARCHITECT'S DOWNSIZE: Fixes the 500 Payload Limit
                const maxDim = 800; 
                const scale = Math.min(1, maxDim / Math.max(video.videoWidth, video.videoHeight));
                
                canvas.width = video.videoWidth * scale;
                canvas.height = video.videoHeight * scale;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // COMPRESSION: 0.5 quality ensures Vercel doesn't crash on Wolverine #1 detail
                const base64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];
                
                // RESOURCE CLEANUP: Free memory for the API call
                video.srcObject.getTracks().forEach(track => track.stop());
                
                ui.runRealScan(base64);
            },

            runRealScan: async (base64Data) => {
                try {
                    const response = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: base64Data })
                    });

                    const data = await response.json();

                    if (data.error) throw new Error(data.error);

                    // Update UI with AI results
                    document.getElementById('scan-overlay').style.display = 'none';
                    document.getElementById('scan-result').classList.remove('hidden');
                    document.getElementById('res-name').innerText = data.name || "Unknown Item";
                    document.getElementById('res-grade').innerText = data.grade || "N/A";
                    document.getElementById('res-value').innerText = data.value || "Calculating...";
                    document.getElementById('res-lore').innerText = data.lore || "";

                } catch (err) {
                    console.error("Scan Failed:", err);
                    document.getElementById('scan-overlay').innerText = "[ CONNECTION_ERROR ]";
                    setTimeout(() => { document.getElementById('scan-overlay').style.display = 'none'; }, 2000);
                }
            }
        };
    </script>
</body>
</html>
