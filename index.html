<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan Taylor | AI Systems Architect</title>
    <style>
        :root {
            --fiji-teal: #00ffcc;
            --dark-bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* 1. RESET & VIEWPORT LOCK */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            height: 100vh; width: 100vw;
            overflow: hidden; 
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* 2. THE 3-TIER BENTO GRID (Based on your Sketch) */
        .container {
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            grid-template-rows: 1.2fr 1fr 0.8fr;
            gap: 15px;
            height: 100vh;
            padding: 15px;
            grid-template-areas: 
                "about automation"
                "vision library"
                "featured featured";
        }

        .bento-card {
            background: var(--glass);
            border-radius: 24px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .bento-card:hover { 
            border-color: var(--fiji-teal); 
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.15);
        }

        /* AREA MAPPING */
        .blue-hero { grid-area: about; cursor: pointer; }
        .green-audit { grid-area: automation; padding: 25px; }
        .yellow-vault { grid-area: vision; padding: 25px; }
        .purple-library { grid-area: library; padding: 25px; }
        .purple-featured { grid-area: featured; padding: 25px; display: flex; align-items: center; justify-content: space-between; }

        /* VIDEO HERO ELEMENTS */
        .hero-video {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover; z-index: 0;
            filter: brightness(0.5) contrast(1.1);
            background: #000;
        }

        .hero-overlay {
            position: absolute; inset: 0; z-index: 1;
            background: linear-gradient(to top, rgba(10,10,10,0.95), transparent 70%);
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 40px;
        }
