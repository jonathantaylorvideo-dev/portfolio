<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan D. Taylor | AI Architect</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    
    <style>
        :root { 
            --primary: #00ffcc; 
            --card: rgba(10, 20, 20, 0.75); 
            --text: #ffffff; 
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background-color: #000; /* Base fallback */
            color: var(--text); font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        /* --- 🌃 THE PARALLAX BACKGROUND --- */
        #parallax-bg {
            position: fixed;
            top: -10%; left: -10%;
            width: 120%; height: 120%;
            /* 🚨 ABSOLUTE PATH CHECK */
            background: url('./assets/city.png') no-repeat center center;
            background-size: cover;
            z-index: -3;
            will-change: transform;
            transition: transform 0.1s ease-out;
        }

        /* --- 🎥 VIDEO OVERLAY --- */
        .video-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; pointer-events: none;
            mix-blend-mode: screen; 
            opacity: 0.3;
        }
        video { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); }

        /* --- 📺 SCANLINES --- */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px;
            z-index: -1; pointer-events: none;
        }

        /* --- 🍱 UI GRID --- */
        .wrapper { 
            position: relative; z-index: 10; 
            height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        
        .bento-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
            max-width: 1100px; width: 100%;
        }

        .card { 
            background: var(--card); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-radius: 24px; padding: 30px;
            transform-style: preserve-3d;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
        }

        .card:hover { border-color: var(--primary); z-index: 100; }

        .hero { grid-column: span 3; cursor: pointer; }
        .hero h1 { 
            font-size: 3.5rem; margin: 0; color: var(--primary); 
            transform: translateZ(60px); 
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
        }

        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; background: #333; margin-right: 10px; }
        .online { background: var(--primary); box-shadow: 0 0 10px var(--primary); }

        button { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        @media (max-width: 850px) { .bento-grid { grid-template-columns: 1fr; } .hero { grid-column: span 1; } }
    </style>
</head>
<body>

    <div id="parallax-bg"></div>

    <div class="video-layer">
        <video id="bgVideo" autoplay muted loop playsinline>
            <source src="./assets/hero-loop.webm" type="video/webm">
        </video>
    </div>

    <div class="scanlines"></div>

    <div class="wrapper">
        <div class="bento-grid">
            
            <div class="card hero" data-tilt>
                <h1>Jonathan D. Taylor</h1>
                <p style="transform: translateZ(30px); opacity: 0.8;">AI Systems Architect</p>
            </div>

            <div class="card" data-tilt>
                <h3>Node Status</h3>
                <span class="status-dot online"></span>
                <span style="font-family: monospace; font-size: 0.8rem;">SYSTEM_READY</span>
            </div>

            <div class="card" data-tilt style="grid-column: span 2;">
                <h3>Strategy Audit</h3>
                <p style="font-size: 0.85rem; opacity: 0.7;">Click to initialize AI workflow audit.</p>
                <button>RUN ENGINE</button>
            </div>

            <div class="card" data-tilt>
                <h3>Creative Lab</h3>
                <p style="font-size: 0.85rem;">Prog-Folk Noir</p>
            </div>

        </div>
    </div>

<script>
    // 🕹️ REINFORCED TILT INITIALIZATION
    function initTilt() {
        VanillaTilt.init(document.querySelectorAll(".card"), {
            max: 15, // Increased tilt
            speed: 800,
            glare: true,
            "max-glare": 0.5,
            perspective: 800, // Lower perspective makes tilt MORE aggressive
            scale: 1.05
        });
    }

    // 🌌 REINFORCED PARALLAX
    const bg = document.getElementById('parallax-bg');
    document.addEventListener('mousemove', (e) => {
        const x = (window.innerWidth / 2 - e.pageX) / 25;
        const y = (window.innerHeight / 2 - e.pageY) / 25;
        bg.style.transform = `translate(${x}px, ${y}px)`;
    });

    // 🎥 REINFORCED VIDEO
    const v = document.getElementById('bgVideo');
    const playV = () => { if(v) v.play().catch(()=>{}); };
    window.addEventListener('load', () => { initTilt(); playV(); });
    document.body.addEventListener('click', playV, {once:true});
</script>
</body>
</html>
