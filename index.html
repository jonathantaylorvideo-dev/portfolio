<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan D. Taylor | AI Architect</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    
    <style>
        :root { --primary: #00ffcc; --card-bg: rgba(5, 12, 12, 0.9); }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background-color: #050505; color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
        }

        /* --- 🌃 CITY LAYER --- */
        #parallax-bg {
            position: fixed; top: -10%; left: -10%; width: 120%; height: 120%;
            background-repeat: no-repeat !important;
            background-position: center center !important;
            background-size: cover !important;
            z-index: -5;
        }

        /* --- 🎥 VIDEO LAYER --- */
        #video-wrap {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -4; pointer-events: none; mix-blend-mode: screen; opacity: 0.3;
        }
        video { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); }

        /* --- 🍱 BENTO --- */
        .main-wrapper { 
            position: relative; z-index: 10; height: 100vh; 
            display: flex; align-items: center; justify-content: center;
        }
        .bento { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 90%; max-width: 1100px; }
        .card { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid rgba(0, 255, 204, 0.2); border-radius: 25px; padding: 35px; transform-style: preserve-3d; }
        .hero { grid-column: span 3; }
        .hero h1 { font-size: 3.5rem; margin: 0; color: var(--primary); transform: translateZ(50px); }

        @media (max-width: 850px) { .bento { grid-template-columns: 1fr; } .hero { grid-column: span 1; } }
    </style>
</head>
<body>

    <div id="parallax-bg"></div>

    <div id="video-wrap">
        <video id="myVid" autoplay muted loop playsinline></video>
    </div>

    <div class="main-wrapper">
        <div class="bento">
            <div class="card hero" data-tilt>
                <h1>Jonathan D. Taylor</h1>
                <p>AI Systems Architect & Agentic Workflow Designer</p>
            </div>
            <div class="card" data-tilt><h3>Node</h3><p style="color:var(--primary)">ONLINE</p></div>
            <div class="card" data-tilt style="grid-column: span 2;"><h3>Audit</h3><button style="width:100%; padding:10px; background:var(--primary); border:none; border-radius:5px; font-weight:bold;">START</button></div>
            <div class="card" data-tilt><h3>Audio</h3><p>Prog-Folk Noir</p></div>
        </div>
    </div>

<script>
    // 🧪 THE PATH FINDER
    // This script manually constructs the URL to ensure GitHub finds your assets
    const currentURL = window.location.href.split('index.html')[0];
    const imagePath = currentURL + 'assets/city.png';
    const videoPath = currentURL + 'assets/hero-loop.webm';

    // Apply Background
    document.getElementById('parallax-bg').style.backgroundImage = `url('${imagePath}')`;
    
    // Apply Video
    const v = document.getElementById('myVid');
    v.src = videoPath;

    // Initialize Tilt
    VanillaTilt.init(document.querySelectorAll(".card"), {
        max: 15, speed: 1000, glare: true, "max-glare": 0.5, perspective: 1000, scale: 1.05
    });

    // Parallax
    document.addEventListener('mousemove', (e) => {
        const bg = document.getElementById('parallax-bg');
        const x = (window.innerWidth / 2 - e.pageX) / 30;
        const y = (window.innerHeight / 2 - e.pageY) / 30;
        bg.style.transform = `translate(${x}px, ${y}px)`;
    });

    window.onload = () => { v.play().catch(() => {}); };
</script>
</body>
</html>
