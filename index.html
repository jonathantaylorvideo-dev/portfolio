<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan D. Taylor | AI Architect</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <style>
        :root { --primary: #00ffcc; --card-bg: rgba(5, 12, 12, 0.9); }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: #000 url('assets/city.png') no-repeat center center fixed;
            background-size: 110%; color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        .overlay { height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, transparent 0%, rgba(0,0,0,0.8) 100%); }
        
        .bento-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 90%; max-width: 1100px; z-index: 10; }

        .card { 
            background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid rgba(0, 255, 204, 0.2); 
            border-radius: 22px; padding: 30px; transform-style: preserve-3d; cursor: pointer; position: relative; overflow: hidden;
        }

        /* --- 🎥 VIDEO IN HERO BOX --- */
        .video-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -1; opacity: 0.4; mix-blend-mode: screen; filter: grayscale(1);
        }

        .hero { grid-column: span 3; min-height: 250px; display: flex; flex-direction: column; justify-content: center; }
        .hero h1 { font-size: 3.2rem; margin: 0; color: var(--primary); text-shadow: 0 0 20px rgba(0,255,204,0.5); }
        
        .tag { font-family: monospace; color: var(--primary); font-size: 0.7rem; letter-spacing: 2px; }

        /* --- 🖥️ MODAL SYSTEM --- */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; z-index: 999; align-items: center; justify-content: center; }
        .modal-content { background: #070f0f; border: 1px solid var(--primary); padding: 40px; border-radius: 24px; width: 80%; max-width: 500px; text-align: center; }
        .close-btn { cursor: pointer; color: var(--primary); font-family: monospace; display: block; margin-top: 20px; }

        @media (max-width: 900px) { .bento-grid { grid-template-columns: 1fr; } .hero { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="overlay">
        <div class="bento-grid">
            <div class="card hero" data-tilt>
                <video class="video-bg" autoplay muted loop playsinline>
                    <source src="assets/hero-loop.webm" type="video/webm">
                </video>
                <span class="tag">[ IDENTITY_CONFIRMED ]</span>
                <h1>Jonathan D. Taylor</h1>
                <p>AI Systems Architect & Agentic Workflow Designer</p>
            </div>

            <div class="card" data-tilt onclick="ui.open('Audit')">
                <span class="tag">01_AUDIT</span>
                <h3>Strategy Audit</h3>
                <p>LGS Bottleneck Analysis</p>
            </div>

            <div class="card" data-tilt style="grid-column: span 2;" onclick="ui.open('Work')">
                <span class="tag">02_WORK</span>
                <h3>Portfolio</h3>
                <p>Case Studies & Deployments</p>
            </div>

            <div class="card" data-tilt onclick="ui.open('Vault')">
                <span class="tag">03_MEDIA</span>
                <h3>Visual Vault</h3>
                <p>Underwater & Film Noir</p>
            </div>

            <div class="card" data-tilt onclick="ui.open('Terminal')">
                <span class="tag">04_LOGS</span>
                <h3>Terminal</h3>
                <p>System Updates</p>
            </div>
        </div>
    </div>

    <div id="modal-overlay" onclick="ui.close()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-body"></div>
            <span class="close-btn">[ CLOSE_SYSTEM ]</span>
        </div>
    </div>

<script>
    // 🧠 Centralized UI Controller (Architect Approach)
    const ui = {
        open: (type) => {
            const body = document.getElementById('modal-body');
            document.getElementById('modal-overlay').style.display = 'flex';
            
            const content = {
                'Audit': `<h2>Audit Node</h2><p>Scanning for LGS bottlenecks...</p><button style="background:var(--primary); padding:10px; border:none; width:100%; margin-top:20px;">RUN_DIAGNOSTIC</button>`,
                'Work': `<h2>Deployments</h2><p>Case Study: Adventures of Intrigue<br>Timeline: Oct 28 - Jan 09</p>`,
                'Vault': `<h2>Visual Vault</h2><p>Underwater Videography Archive Loading...</p>`,
                'Terminal': `<h2>System Logs</h2><p style="font-family:monospace;">> Node Active<br>> Vibe Coding engaged.</p>`
            };
            body.innerHTML = content[type] || 'No Data Found';
        },
        close: () => { document.getElementById('modal-overlay').style.display = 'none'; }
    };

    // Parallax
    document.addEventListener('mousemove', (e) => {
        const x = (window.innerWidth / 2 - e.pageX) / 50;
        const y = (window.innerHeight / 2 - e.pageY) / 50;
        document.body.style.backgroundPosition = `calc(50% + ${x}px) calc(50% + ${y}px)`;
    });

    // Init Tilt
    VanillaTilt.init(document.querySelectorAll(".card"), { max: 8, speed: 1000, glare: true, "max-glare": 0.2 });
</script>
</body>
</html>
