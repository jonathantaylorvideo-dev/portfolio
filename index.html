<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jonathan D. Taylor | AI Architect</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <style>
        :root { --primary: #00cca3; --card-bg: rgba(7,10,10,0.9); --snap-pink: #bc005e; }
        body { margin:0; background:#000; color:#e0e0e0; font-family: sans-serif; overflow-x:hidden; }
        .bento { display:grid; grid-template-columns: repeat(4, 1fr); gap:20px; padding:40px; max-width:1200px; margin:auto; }
        .card { background:var(--card-bg); border:1px solid rgba(0,204,163,0.2); border-radius:20px; padding:25px; cursor:pointer; transition:0.3s; }
        .card:hover { border-color:var(--primary); box-shadow: 0 0 30px rgba(0,204,163,0.1); }
        .hero { grid-column: span 3; }
        #status-text { font-family:monospace; font-size:0.7rem; color:var(--snap-pink); }
        
        /* Modal & Vault Styling */
        #modal { position:fixed; inset:0; background:rgba(0,0,0,0.95); display:none; z-index:999; justify-content:center; align-items:center; }
        .modal-inner { width:90%; max-width:800px; background:#080c0c; border:1px solid var(--primary); padding:40px; border-radius:25px; }
        .vault-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap:15px; margin-top:20px; }
        .vault-item { aspect-ratio:1; background:#111; border-radius:10px; overflow:hidden; border:1px solid #222; }
        .vault-item img { width:100%; height:100%; object-fit:cover; opacity:0.7; transition:0.3s; }
        .vault-item:hover img { opacity:1; transform:scale(1.1); }
    </style>
</head>
<body>
    <div class="bento">
        <div class="card hero" onclick="ui.open('About')">
            <div id="status-text">OFFLINE</div>
            <h1 style="color:var(--primary); margin:0;">Jonathan D. Taylor</h1>
            <p>AI Systems Architect</p>
        </div>
        <div class="card" onclick="ui.open('Audit')"><h3>AI Auditor</h3><p>Diagnostic Engine</p></div>
        <div class="card" onclick="ui.open('Vault')"><h3>Visual Vault</h3><p>Neural Assets</p></div>
    </div>

    <div id="modal" onclick="ui.close()"><div class="modal-inner" id="modal-content" onclick="event.stopPropagation()"></div></div>

<script>
    const API_BASE = "https://ai-strategy-engine.onrender.com";

    const ui = {
        open: (type) => {
            const content = document.getElementById('modal-content');
            document.getElementById('modal').style.display = 'flex';
            
            if(type === 'Vault') {
                content.innerHTML = `<h2>Visual Vault</h2><div class="vault-grid">
                    <div class="vault-item"><img src="assets/project1.jpg" alt="P1"></div>
                    <div class="vault-item"><img src="assets/project2.jpg" alt="P2"></div>
                </div>`;
            } else if(type === 'Audit') {
                content.innerHTML = `<h2>AI Audit</h2><div id="chat" style="height:300px; overflow-y:auto; margin-bottom:15px;"></div>
                <input type="text" id="inp" style="width:80%; padding:10px;" placeholder="Describe your business..."><button onclick="ui.send()">SEND</button>`;
                ui.addMsg("System online. What is your business friction point?");
            }
        },
        addMsg: (t) => { document.getElementById('chat').innerHTML += `<p>${t}</p>`; },
        send: async () => {
            const val = document.getElementById('inp').value;
            ui.addMsg("<b>You:</b> " + val);
            const res = await fetch(`${API_BASE}/api/audit`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ history: [{role:'user', text: val}] })
            });
            const data = await res.json();
            ui.addMsg("<b>AI:</b> " + data.analysis);
        },
        close: () => { document.getElementById('modal').style.display = 'none'; },
        check: async () => {
            try {
                const res = await fetch(`${API_BASE}/`);
                const status = await res.text();
                const el = document.getElementById('status-text');
                el.innerText = status === "CONNECTED" ? "UPLINK_LIVE" : "KEY_ERROR";
                el.style.color = status === "CONNECTED" ? "#00cca3" : "#bc005e";
            } catch(e) { document.getElementById('status-text').innerText = "DISCONNECTED"; }
        }
    };
    ui.check();
    VanillaTilt.init(document.querySelectorAll(".card"), { max: 5 });
</script>
</body>
</html>
