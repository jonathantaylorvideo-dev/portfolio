<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan D. Taylor | AI Architect</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    
    <style>
        :root { --primary: #00ffcc; --card-bg: rgba(5, 10, 10, 0.85); }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: #000; color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        /* --- 🌀 LOADING SCREEN --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }
        .pulse {
            width: 50px; height: 50px; border: 3px solid var(--primary);
            border-radius: 50%; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.8); opacity: 0.5; } }

        /* --- 🌃 THE BACKGROUND --- */
        #city-bg {
            position: fixed; top: -10%; left: -10%; width: 120%; height: 120%;
            background: url('assets/city.png') no-repeat center center;
            background-size: cover; z-index: -3;
            opacity: 0; transition: opacity 1s ease; /* Fades in when ready */
        }

        .video-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; pointer-events: none; mix-blend-mode: screen; opacity: 0.35;
        }
        video { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); }

        /* --- 🍱 INTERFACE --- */
        .wrapper { position: relative; z-index: 10; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .bento-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 90%; max-width: 1100px; }
        .card { background: var(--card-bg); backdrop-filter: blur(25px); border: 1px solid rgba(0, 255, 204, 0.2); border-radius: 20px; padding: 30px; transform-style: preserve-3d; }
        .hero h1 { font-size: 3rem; margin: 0; color: var(--primary); transform: translateZ(60px); }
        .hero { grid-column: span 3; }

        @media (max-width: 850px) { .bento-grid { grid-template-columns: 1fr; } .hero { grid-column: span 1; } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="pulse"></div>
        <p style="margin-top: 20px; letter-spacing: 5px; color: var(--primary);">INITIALIZING_LINK...</p>
    </div>

    <div id="city-bg"></div>

    <div class="video-layer">
        <video id="bgVideo" autoplay muted loop playsinline>
            <source src="assets/hero-loop.webm" type="video/webm">
        </video>
    </div>

    <div class="wrapper">
        <div class="bento-grid">
            <div class="card hero" data-tilt>
                <h1>Jonathan D. Taylor</h1>
                <p style="opacity: 0.7;">AI Systems Architect</p>
            </div>
            <div class="card" data-tilt><h3>Node</h3><p style="font-size: 0.8rem;">Ready</p></div>
            <div class="card" data-tilt style="grid-column: span 2;"><h3>Audit</h3><button style="width:100%; padding:10px; background:var(--primary); border:none; border-radius:5px; font-weight:bold;">START</button></div>
            <div class="card" data-tilt><h3>Lab</h3><p style="font-size: 0.8rem;">Noir</p></div>
        </div>
    </div>

<script>
    const bgImg = new Image();
    bgImg.src = 'assets/city.png';
    
    bgImg.onload = function() {
        // Hide loader and show background once image is cached
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('city-bg').style.opacity = '1';
        }, 800);

        VanillaTilt.init(document.querySelectorAll(".card"), { max: 15, speed: 1000, glare: true, "max-glare": 0.4 });

        const bgDiv = document.getElementById('city-bg');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 30;
            const y = (window.innerHeight / 2 - e.pageY) / 30;
            bgDiv.style.transform = `translate(${x}px, ${y}px)`;
        });
    };

    // If the image fails to load, still hide the loader so user can see the cards
    bgImg.onerror = function() {
        document.getElementById('loader').style.display = 'none';
    };
</script>
</body>
</html>
