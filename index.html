<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan D. Taylor | AI Architect</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    
    <style>
        :root { 
            --primary: #00ffcc; 
            --card-bg: rgba(5, 10, 10, 0.8); 
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: #000; color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        /* --- 🌃 PARALLAX IMAGE --- */
        #city-bg {
            position: fixed;
            top: -15%; left: -15%;
            width: 130%; height: 130%;
            background: url('assets/city.png') no-repeat center center;
            background-size: cover;
            z-index: -3;
            will-change: transform;
        }

        /* --- 🎥 HERO VIDEO OVERLAY --- */
        .video-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; pointer-events: none;
            mix-blend-mode: screen; 
            opacity: 0.4;
        }
        
        video { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            filter: grayscale(1) contrast(1.2); 
        }

        /* --- 🍱 INTERFACE --- */
        .wrapper { 
            position: relative; z-index: 10; height: 100vh; 
            display: flex; align-items: center; justify-content: center;
        }
        
        .bento-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 25px; width: 90%; max-width: 1100px;
        }

        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-radius: 24px; padding: 35px;
            transform-style: preserve-3d;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
        }

        .hero { grid-column: span 3; }
        .hero h1 { 
            font-size: 3.5rem; margin: 0; color: var(--primary); 
            transform: translateZ(80px);
            text-shadow: 0 0 25px rgba(0, 255, 204, 0.4);
        }

        button { 
            width: 100%; padding: 12px; background: var(--primary); 
            border: none; border-radius: 8px; font-weight: 800; cursor: pointer;
        }

        @media (max-width: 850px) { .bento-grid { grid-template-columns: 1fr; } .hero { grid-column: span 1; } }
    </style>
</head>
<body>

    <div id="city-bg"></div>

    <div class="video-layer">
        <video id="bgVideo" autoplay muted loop playsinline poster="assets/city.png">
            <source src="assets/hero-loop.webm" type="video/webm">
        </video>
    </div>

    <div class="wrapper">
        <div class="bento-grid">
            
            <div class="card hero" data-tilt>
                <h1>Jonathan D. Taylor</h1>
                <p style="transform: translateZ(40px); opacity: 0.8;">AI Systems Architect</p>
                <p style="color: var(--primary); font-family: monospace; font-size: 0.8rem;">[ VIDEO_FEED: STABLE ]</p>
            </div>

            <div class="card" data-tilt>
                <h3>Status</h3>
                <p style="font-size: 0.8rem;">Node 01 Online</p>
            </div>

            <div class="card" data-tilt style="grid-column: span 2;">
                <h3>Strategy Audit</h3>
                <button>INITIALIZE ENGINE</button>
            </div>

            <div class="card" data-tilt>
                <h3>Lab</h3>
                <p style="font-size: 0.8rem;">Prog-Folk Noir</p>
            </div>

        </div>
    </div>

<script>
    window.onload = function() {
        // Initialize Tilt
        VanillaTilt.init(document.querySelectorAll(".card"), {
            max: 20, speed: 1000, glare: true, "max-glare": 0.5, perspective: 800, scale: 1.05
        });

        // Background Parallax Logic
        const bg = document.getElementById('city-bg');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 25;
            const y = (window.innerHeight / 2 - e.pageY) / 25;
            bg.style.transform = `translate(${x}px, ${y}px)`;
        });
        
        // Force video play on first click (Browser security often blocks autoplay)
        document.body.addEventListener('click', () => {
            const v = document.getElementById('bgVideo');
            if(v) v.play();
        }, { once: true });
    };
</script>
</body>
</html>
