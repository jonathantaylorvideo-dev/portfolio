<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan D. Taylor | AI Architect</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    
    <style>
        :root { 
            --primary: #00ffcc; 
            --card-bg: rgba(5, 10, 10, 0.9); 
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            /* 🚨 NO LAYERS: DIRECT BACKGROUND */
            background: #000 url('assets/city.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        /* --- 🍱 INTERFACE --- */
        .wrapper { 
            position: relative; z-index: 10; height: 100vh; 
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.3); /* Slight darkening for readability */
        }
        
        .bento-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 25px; width: 90%; max-width: 1100px;
        }

        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 24px; padding: 40px;
            transform-style: preserve-3d;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9);
        }

        .hero { grid-column: span 3; }
        .hero h1 { 
            font-size: 3.5rem; margin: 0; color: var(--primary); 
            transform: translateZ(50px);
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
        }

        @media (max-width: 850px) { .bento-grid { grid-template-columns: 1fr; } .hero { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="bento-grid">
            
            <div class="card hero" data-tilt>
                <h1>Jonathan D. Taylor</h1>
                <p style="opacity: 0.8;">AI Systems Architect</p>
            </div>

            <div class="card" data-tilt>
                <h3>Status</h3>
                <p style="font-size: 0.8rem; color: var(--primary);">CONNECTED</p>
            </div>

            <div class="card" data-tilt style="grid-column: span 2;">
                <h3>Strategy Audit</h3>
                <button style="width:100%; padding:10px; background:var(--primary); border:none; border-radius:5px; font-weight:bold;">ENTER_SYSTEM</button>
            </div>

            <div class="card" data-tilt>
                <h3>Creative</h3>
                <p style="font-size: 0.8rem;">Noir</p>
            </div>

        </div>
    </div>

<script>
    // Initialize Tilt immediately without waiting for images
    VanillaTilt.init(document.querySelectorAll(".card"), {
        max: 15, speed: 1000, glare: true, "max-glare": 0.5, perspective: 1000, scale: 1.05
    });
</script>
</body>
</html>
