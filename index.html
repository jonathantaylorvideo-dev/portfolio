<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan Taylor | AI Systems Architect</title>
    <style>
        :root {
            --fiji-teal: #00ffcc;
            --dark-bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            height: 100vh; width: 100vw;
            overflow: hidden; 
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        /* BENTO GRID */
        .container {
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            grid-template-rows: 1.2fr 1fr 0.8fr;
            gap: 15px;
            height: 100vh;
            padding: 15px;
            grid-template-areas: 
                "hero audit"
                "vision library"
                "featured featured";
        }

        .bento-card {
            background: var(--glass);
            border-radius: 24px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
        }

        .blue-hero { grid-area: hero; cursor: pointer; }
        .green-audit { grid-area: audit; padding: 30px; display: flex; flex-direction: column; }
        .yellow-vault { grid-area: vision; padding: 25px; }
        .purple-library { grid-area: library; padding: 25px; }
        .purple-featured { grid-area: featured; padding: 25px; display: flex; align-items: center; justify-content: space-between; }

        /* VIDEO HERO */
        .hero-video {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover; z-index: 0;
            filter: brightness(0.4) contrast(1.1);
        }

        .hero-overlay {
            position: absolute; inset: 0; z-index: 1;
            background: linear-gradient(to top, rgba(10,10,10,0.9), transparent);
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 40px;
        }

        /* AUDIT FUNNEL STYLES */
        .label { color: var(--fiji-teal); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; margin-bottom: 8px; display: block; }
        .roi-val { font-family: monospace; font-size: 2.2rem; color: var(--fiji-teal); margin: 10px 0; text-shadow: 0 0 10px rgba(0,255,204,0.3); }
        
        .audit-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            margin-top: 15px;
            font-family: monospace;
            outline: none;
        }
        .audit-input:focus { border-color: var(--fiji-teal); }

        .btn-fiji {
            background: var(--fiji-teal);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            transition: 0.3s;
        }
        .btn-fiji:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .container { grid-template-areas: "hero" "audit" "vision" "library" "featured"; grid-template-columns: 1fr; overflow-y: auto; height: auto; }
            body { overflow-y: auto; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="bento-card blue-hero" onclick="toggleModal(true)">
            <video id="heroVideo" autoplay muted loop playsinline class="hero-video">
                <source src="assets/hero-loop.webm" type="video/webm">
                <source src="assets/hero-loop.mp4" type="video/mp4">
            </video>
            <div class="hero-overlay">
                <span class="label">Principal Architect</span>
                <h1>Jonathan Taylor</h1>
                <p style="color: var(--fiji-teal);">Multimedia & AI Orchestration</p>
            </div>
        </div>

        <div class="bento-card green-audit" id="audit-card">
            <span class="label">Efficiency Engine</span>
            <div id="audit-flow">
                <h2>System ROI Tracker</h2>
                <div class="roi-val" id="roi-counter">248.50 HRS</div>
                <p style="font-size: 0.8rem; opacity: 0.6;">Total operational hours recovered for clients this year.</p>
                <button class="btn-fiji" onclick="startAudit()">INITIATE FREE AUDIT</button>
            </div>
        </div>

        <div class="bento-card yellow-vault">
            <span class="label">Vision Vault</span>
            <h2>Inventory Scan</h2>
